<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Steel Guitar FX">
<meta name="theme-color" content="#080604">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Steel Guitar FX</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080604;
  --panel:#100d08;
  --border:#2e2414;
  --amber:#c8922a;
  --gold:#e8c45a;
  --cream:#ede0c4;
  --dim:#2a1e0c;
  --rust:#7a3010;
  --glow:rgba(232,196,90,.35);
  --binding:#d4a830;
  --chrome:#d8d0b8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:'IBM Plex Mono',monospace;overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5;}

.app{display:flex;flex-direction:column;height:100vh;padding:8px 12px 6px;}

/* Header */
.hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;color:var(--gold);letter-spacing:.1em;text-shadow:0 0 16px var(--glow);}
.logo i{font-style:italic;color:var(--amber);}
.hbtn{padding:3px 9px;font-size:9px;letter-spacing:.12em;background:var(--panel);border:1px solid var(--border);color:var(--cream);cursor:pointer;border-radius:3px;transition:all .13s;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.hbtn.on{background:var(--amber);color:#000;border-color:var(--gold);}
.wrow{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-shrink:0;flex-wrap:wrap;}
.wbtn{padding:3px 8px;font-size:9px;letter-spacing:.08em;background:var(--panel);border:1px solid var(--border);color:var(--cream);cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
.bbtn{padding:3px 8px;font-size:9px;letter-spacing:.08em;background:var(--panel);border:1px solid var(--border);color:#888;cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
.bbtn.active{border-color:#aaa;background:#3a3a3a;color:#fff;}
.pbtn{padding:3px 10px;font-size:9px;letter-spacing:.08em;background:#2a1a00;border:1px solid #6a4a10;color:#c89030;cursor:pointer;border-radius:3px;transition:all .1s;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;flex-shrink:0;user-select:none;-webkit-user-select:none;}
.pbtn.ped-on{background:#c89030;border-color:#f8d060;color:#1a0a00;}
.sp{flex:1;}

/* Transport */
.tp{display:flex;align-items:center;gap:7px;flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:5px 10px;margin-bottom:7px;}
.tbtn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;}
.tbtn.pb{background:radial-gradient(circle at 40% 35%,var(--amber),#5a1e04);box-shadow:0 0 12px rgba(200,146,42,.45);}
.tbtn.sb{background:var(--dim);border:1px solid var(--border);}
.tbtn svg{width:16px;height:16px;fill:#fff;}
.tbtn.sb svg{fill:var(--amber);}
.ts{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.tl{font-size:8px;color:var(--amber);letter-spacing:.12em;text-transform:uppercase;}
.ti{width:52px;background:var(--bg);border:1px solid var(--border);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:14px;text-align:center;border-radius:3px;padding:4px 0;}
.tsl{background:var(--bg);border:1px solid var(--border);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:3px;padding:4px 6px;}
.lbtn{padding:6px 10px;font-size:9px;letter-spacing:.1em;background:var(--dim);border:1px solid var(--border);color:var(--amber);cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;transition:all .13s;text-transform:uppercase;}
.lbtn.on{border-color:var(--gold);color:var(--gold);}
.bd{font-size:14px;color:var(--gold);letter-spacing:.05em;min-width:46px;text-align:right;text-shadow:0 0 10px var(--glow);margin-left:auto;}

/* Body */
.body{display:flex;gap:8px;flex:1;min-height:0;}

/* Center */
.center{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}

/* Mode toggle */
.mode-bar{display:flex;gap:3px;flex-shrink:0;}
.mbtn{padding:3px 11px;font-size:9px;letter-spacing:.13em;background:var(--panel);border:1px solid var(--border);color:var(--cream);opacity:.55;cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;transition:all .12s;text-transform:uppercase;}
.mbtn.on{opacity:1;border-color:var(--amber);color:var(--gold);}

/* Guitar canvas wrapper */
.guitar-wrap{flex:1;position:relative;border-radius:14px;overflow:hidden;min-height:0;
  box-shadow:0 0 0 3px var(--binding),0 0 0 5px #1a1000,0 0 0 7px #a07820,0 12px 48px rgba(0,0,0,.75);}
#guitar-canvas{display:block;width:100%;height:100%;}

/* String hit overlay */
.hit-canvas{position:absolute;inset:0;pointer-events:none;}
.interact-layer{position:absolute;inset:0;pointer-events:none;touch-action:none;-webkit-user-select:none;user-select:none;}

/* Sequencer overlay */
.seq-overlay{position:absolute;inset:0;background:rgba(5,4,2,.92);border-radius:11px;display:none;flex-direction:column;padding:8px 6px 6px;overflow:hidden;}
.seq-overlay.open{display:flex;}
.seq-scroll{flex:1;overflow:auto;-webkit-user-select:none;user-select:none;touch-action:pan-x pan-y;}
.seq-scroll::-webkit-scrollbar{width:4px;height:4px;}
.seq-scroll::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.seq-grid{display:flex;flex-direction:column;gap:3px;min-width:max-content;}
.srow{display:flex;align-items:center;gap:2px;}
.slbl{width:48px;flex-shrink:0;font-size:9px;color:var(--amber);text-align:right;padding-right:5px;white-space:nowrap;}
.scell{width:26px;height:22px;border-radius:2px;background:#18120a;border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:background .1s;-webkit-user-select:none;user-select:none;touch-action:none;}
.scell:hover{border-color:var(--amber);}
.scell.on{background:var(--amber);border-color:var(--gold);}
.scell.ph{outline:2px solid var(--gold);outline-offset:-2px;}
.b4{border-left:2px solid #3a2a10!important;}
.vel-row{display:flex;gap:2px;margin-left:50px;margin-top:3px;height:26px;}
.vbw{width:26px;flex-shrink:0;height:100%;display:flex;align-items:flex-end;cursor:ns-resize;}
.vbi{width:100%;background:var(--dim);border-radius:1px 1px 0 0;min-height:2px;}
.vbi.lit{background:linear-gradient(to top,var(--amber),var(--gold));}
.seq-close{flex-shrink:0;text-align:right;margin-bottom:4px;}
.seq-close button{padding:2px 8px;font-size:9px;background:var(--dim);border:1px solid var(--border);color:var(--amber);cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;}

/* FX panel */
.fx{width:146px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.fbox{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:9px 8px;display:flex;flex-direction:column;gap:6px;}
.fhd{font-size:8px;letter-spacing:.22em;color:var(--amber);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:3px;}
.frow{display:flex;flex-direction:column;gap:2px;}
.ftop{display:flex;justify-content:space-between;}
.fn{font-size:8px;color:var(--cream);opacity:.6;letter-spacing:.06em;text-transform:uppercase;}
.fv{font-size:9px;color:var(--gold);min-width:42px;text-align:right;}
.fsl{width:100%;-webkit-appearance:none;appearance:none;height:3px;background:var(--dim);border-radius:2px;outline:none;cursor:pointer;}
.fsl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--gold),var(--amber));box-shadow:0 0 4px var(--glow);}
.pitch-big{text-align:center;font-size:18px;color:var(--gold);text-shadow:0 0 14px var(--glow);}
.vu-b{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;}
.vu-f{height:100%;width:0%;background:linear-gradient(to right,#5c9,var(--gold),#c43);border-radius:2px;transition:width .04s;}
.clr{width:100%;padding:4px;background:transparent;border:1px solid var(--rust);color:#a05030;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .13s;margin-top:2px;}
.clr:hover{background:var(--rust);color:#fff;}
.slot-row{display:flex;gap:3px;margin-top:2px;}
.slot-btn{flex:1;padding:4px 2px;font-size:9px;letter-spacing:.08em;background:var(--dim);border:1px solid var(--border);color:var(--cream);cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;transition:all .12s;text-transform:uppercase;}
.slot-btn.active{background:var(--amber);color:#000;border-color:var(--gold);}
.midi-btn{width:100%;padding:5px;font-size:8px;letter-spacing:.12em;background:var(--dim);border:1px solid #2a4a2a;color:#6a9a6a;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .13s;margin-top:3px;}
.midi-btn:hover{background:#1a3a1a;color:#8aba8a;}
.clr:hover{background:var(--rust);color:#fff;}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="logo">Steel <i>Guitar</i> FX</div>
  <button class="hbtn on" id="t-lap" onclick="setTuning('lap6',this)">LAP 6</button>
  <button class="hbtn"    id="t-e9"  onclick="setTuning('e9',this)">E9 PEDAL</button>
  <div class="sp"></div>
</div>
<div class="wrow">
  <button class="wbtn" id="w-maple"    onclick="setWood('maple',this)">Maple</button>
  <button class="wbtn" id="w-mahogany" onclick="setWood('mahogany',this)">Mahogany</button>
  <button class="wbtn" id="w-koa"      onclick="setWood('koa',this)">Koa</button>
  <button class="wbtn" id="w-rosewood" onclick="setWood('rosewood',this)">Rosewood</button>
  <button class="wbtn" id="w-walnut"   onclick="setWood('walnut',this)">Walnut</button>
  <button class="wbtn" id="w-ash"      onclick="setWood('ash',this)">Ash</button>
</div>
<div class="wrow">
  <span style="color:#888;font-size:9px;margin-right:4px;line-height:22px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em;">Bar:</span>
  <button class="bbtn active" id="b-steel"   onclick="setBar('steel',this)">Steel</button>
  <button class="bbtn" id="b-glass"   onclick="setBar('glass',this)">Glass</button>
  <button class="bbtn" id="b-brass"   onclick="setBar('brass',this)">Brass</button>
  <button class="bbtn" id="b-ceramic" onclick="setBar('ceramic',this)">Ceramic</button>
</div>

<div class="tp">
  <button class="tbtn pb" id="play-btn"><svg id="play-ico" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>
  <button class="tbtn sb" onclick="stopSeq()"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg></button>
  <button class="lbtn on" id="loop-btn" onclick="toggleLoop()">⟳ Loop</button>
  <button class="lbtn"    id="shot-btn" onclick="toggleShot()">▶ One-shot</button>
  <div class="ts"></div>
  <span class="tl">BPM</span>
  <input class="ti" id="bpm-in" type="number" value="90" min="40" max="240">
  <div class="ts"></div>
  <span class="tl">Steps</span>
  <select class="tsl" id="step-sel" onchange="changeSteps()">
    <option value="16">16</option><option value="32" selected>32</option><option value="64">64</option>
  </select>
  <div class="bd" id="bdisp">—</div>
</div>

<div class="body">
  <div class="center">
    <div class="mode-bar">
      <button class="mbtn on" id="mb-play" onclick="setMode('play',this)">▶ Play Mode</button>
      <button class="mbtn"    id="mb-seq"  onclick="setMode('seq',this)">⊞ Sequencer</button>
      <span style="color:#666;font-size:9px;margin-left:4px;font-family:'IBM Plex Mono',monospace;">PEDAL:</span>
      <button class="pbtn" id="ped-A"
        onmousedown="setPedal('A',true)" onmouseup="setPedal('A',false)" onmouseleave="setPedal('A',false)"
        ontouchstart="setPedal('A',true);event.preventDefault()" ontouchend="setPedal('A',false)">A</button>
      <button class="pbtn" id="ped-B"
        onmousedown="setPedal('B',true)" onmouseup="setPedal('B',false)" onmouseleave="setPedal('B',false)"
        ontouchstart="setPedal('B',true);event.preventDefault()" ontouchend="setPedal('B',false)">B</button>
    </div>
    <div class="guitar-wrap" id="guitar-wrap">
      <canvas id="guitar-canvas"></canvas>
      <canvas id="hit-canvas" class="hit-canvas"></canvas>
      <div id="interact-layer" class="interact-layer"></div>
      <!-- WHY two layers: bar-layer handles slide bar drag, string-layer handles plucking. No interference. -->
      <!-- bar-layer: z-index:5 = above string-layer, clip-path defines hit area around bar -->
      <div id="bar-layer" style="position:absolute;inset:0;pointer-events:none;touch-action:none;z-index:5;"></div>
      <!-- string-layer: z-index:4 = below bar-layer, handles plucking everywhere else -->
      <div id="string-layer" style="position:absolute;inset:0;touch-action:none;z-index:4;-webkit-user-select:none;user-select:none;"></div>
      <!-- Sequencer overlay -->
      <div class="seq-overlay" id="seq-overlay">
        <div class="seq-close"><button onclick="setMode('play',document.getElementById('mb-play'))">Close</button></div>
        <div class="seq-scroll">
          <div class="seq-grid" id="seq-grid"></div>
          <div class="vel-row" id="vel-row"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="fx">
    <div class="fbox">
      <div class="fhd">Vibrato</div>
      <div class="frow"><div class="ftop"><span class="fn">Depth</span><span class="fv" id="fv-vd">30%</span></div><input class="fsl" type="range" id="fs-vd" min="0" max="100" value="30"></div>
      <div class="frow"><div class="ftop"><span class="fn">Rate</span><span class="fv" id="fv-vr">5.0Hz</span></div><input class="fsl" type="range" id="fs-vr" min="5" max="80" value="50"></div>
    </div>
    <div class="fbox">
      <div class="fhd">Pitch / Glide</div>
      <div class="pitch-big" id="pitch-big">+0.0</div>
      <div class="frow"><div class="ftop"><span class="fn">Bend</span><span class="fv" id="fv-pb">+0.0st</span></div><input class="fsl" type="range" id="fs-pb" min="-120" max="120" value="0"></div>
      <div class="frow"><div class="ftop"><span class="fn">Glide</span><span class="fv" id="fv-gl">80ms</span></div><input class="fsl" type="range" id="fs-gl" min="10" max="500" value="80"></div>
    </div>
    <div class="fbox" style="flex:1">
      <div class="fhd">Tone / FX</div>
      <div class="frow"><div class="ftop"><span class="fn">Tone</span><span class="fv" id="fv-tn">70%</span></div><input class="fsl" type="range" id="fs-tn" min="0" max="100" value="70"></div>
      <div class="frow"><div class="ftop"><span class="fn">Reverb</span><span class="fv" id="fv-rv">25%</span></div><input class="fsl" type="range" id="fs-rv" min="0" max="100" value="25"></div>
      <div class="frow"><div class="ftop"><span class="fn">Output</span><span class="fv" id="fv-out">0dB</span></div><input class="fsl" type="range" id="fs-out" min="-24" max="6" value="0"></div>
      <div class="fhd" style="margin-top:2px">Level</div>
      <div class="vu-b"><div class="vu-f" id="vu-fill"></div></div>
      <div class="fhd" style="margin-top:2px">Patterns</div>
      <div class="slot-row">
        <button class="slot-btn active" id="slot-A" onclick="loadSlot('A',this)">A</button>
        <button class="slot-btn" id="slot-B" onclick="loadSlot('B',this)">B</button>
        <button class="slot-btn" id="slot-C" onclick="loadSlot('C',this)">C</button>
        <button class="slot-btn" id="slot-D" onclick="loadSlot('D',this)">D</button>
      </div>
      <div class="slot-row">
        <button class="slot-btn" onclick="saveSlot()" style="flex:2;color:var(--gold);border-color:var(--amber);">Save</button>
        <button class="clr" onclick="clearAll()" style="flex:2;margin-top:0;">Clear</button>
      </div>
      <button class="midi-btn" onclick="exportMIDI()">Export MIDI</button>
    </div>
  </div>
</div>
</div>

<script>
// ════════════════════════════════════════════════
// TUNINGS
// ════════════════════════════════════════════════
const TUNINGS={
  lap6:{label:'E · B · G · D · A · E',strings:[
    {name:'1',note:'E5',freq:659.25,thick:1.2,col:'#e8dfa8'},
    {name:'2',note:'B4',freq:493.88,thick:1.6,col:'#d8cf98'},
    {name:'3',note:'G4',freq:392.00,thick:2.1,col:'#c8bf88'},
    {name:'4',note:'D4',freq:293.66,thick:2.7,col:'#b8af78'},
    {name:'5',note:'A3',freq:220.00,thick:3.4,col:'#a89f68'},
    {name:'6',note:'E3',freq:164.81,thick:4.2,col:'#988f58'},
  ]},
  e9:{label:'F#·D#·G#·E·B·G#·E·D·B·F#',strings:[
    {name:'1', note:'F#5',freq:739.99,thick:1.0,col:'#f0e8b0'},
    {name:'2', note:'D#5',freq:622.25,thick:1.3,col:'#e4dca4'},
    {name:'3', note:'G#4',freq:415.30,thick:1.6,col:'#d8d098'},
    {name:'4', note:'E4', freq:329.63,thick:2.0,col:'#ccc48c'},
    {name:'5', note:'B3', freq:246.94,thick:2.4,col:'#c0b880'},
    {name:'6', note:'G#3',freq:207.65,thick:2.8,col:'#b4ac74'},
    {name:'7', note:'E3', freq:164.81,thick:3.2,col:'#a8a068'},
    {name:'8', note:'D3', freq:146.83,thick:3.6,col:'#9c9460'},
    {name:'9', note:'B2', freq:123.47,thick:4.0,col:'#908858'},
    {name:'10',note:'F#2',freq:92.50, thick:4.8,col:'#847c50'},
  ]}
};

let tuning='lap6', numSteps=32, mode='play';
let loopOn=true, oneShot=false, playing=false;
let currentStep=-1, stepTimer=null;
let ctx_a=null, reverbConv=null, reverbGain=null, dryGain=null;
let vibratoPhase=0, pitchCurrent=0;
let selectedString=0;
let slidePct=0.35; // steel bar horizontal position

// ── PEDAL STEEL LOGIC ──
// WHY: E9 pedal steel pedals raise specific strings while engaged.
// Pedal A: strings 3+4 up +200 cents (whole tone) — classic A pedal on E9
// Pedal B: strings 5+6 up +100 cents (semitone) — classic B pedal on E9
// pedalCents[si] = current smoothed pitch offset for string index si
const pedalStates={A:false, B:false};
const PEDAL_TARGETS={
  A:{strings:[2,3], cents:200}, // 0-indexed: string 3+4
  B:{strings:[4,5], cents:100}  // 0-indexed: string 5+6
};
const pedalCents={}; // smoothed per-string pitch offset
let _rafPending=false;
function schedDraw(){
  if(_rafPending) return;
  _rafPending=true;
  requestAnimationFrame(()=>{_rafPending=false; drawGuitar();});
}

// WHY bar materials: Steel/Glass/Brass/Ceramic each have distinct tone + look
const BAR_MATERIALS={
  steel:{
    draw:(ctx,bx,by,bw,bh)=>{
      ctx.fillStyle='rgba(0,0,0,.4)'; roundRect(ctx,bx+3,by+3,bw,bh,8); ctx.fill();
      const g=ctx.createLinearGradient(bx,0,bx+bw,0);
      g.addColorStop(0,'#707060');g.addColorStop(.2,'#d0c8b0');g.addColorStop(.35,'#f0ece0');
      g.addColorStop(.5,'#ffffff');g.addColorStop(.65,'#e8e0c8');g.addColorStop(.8,'#b8b0a0');g.addColorStop(1,'#606050');
      ctx.fillStyle=g; roundRect(ctx,bx,by,bw,bh,8); ctx.fill();
      ctx.strokeStyle='rgba(80,70,50,.25)'; ctx.lineWidth=1;
      for(let i=0;i<bh-16;i+=7){ctx.beginPath();ctx.moveTo(bx+3,by+8+i);ctx.lineTo(bx+bw-3,by+8+i);ctx.stroke();}
      const hg=ctx.createLinearGradient(bx,0,bx+bw,0);
      hg.addColorStop(0,'rgba(255,255,255,0)');hg.addColorStop(.3,'rgba(255,255,255,.6)');
      hg.addColorStop(.6,'rgba(255,255,255,.1)');hg.addColorStop(1,'rgba(255,255,255,0)');

const gc=document.getElementById('guitar-canvas');
const gc2=document.getElementById('hit-canvas');
let gctx=null, hctx=null;
let stringYs=[], slideX=0, bodyRect={x:0,y:0,w:0,h:0};
let hitParticles=[];

function resizeCanvases(){
  const wrap=document.getElementById('guitar-wrap');
  const W=wrap.clientWidth, H=wrap.clientHeight;
  gc.width=W; gc.height=H;
  gc2.width=W; gc2.height=H;
  if(!gctx){gctx=gc.getContext('2d');hctx=gc2.getContext('2d');}
  drawGuitar();
}

function drawGuitar(){
  const W=gc.width, H=gc.height;
  gctx.clearRect(0,0,W,H);
  const strs=TUNINGS[tuning].strings;

  // ── Body shape (rounded rect) ──
  const bx=0,by=0,bw=W,bh=H;
  bodyRect={x:bx,y:by,w:bw,h:bh};
  roundRect(gctx,bx,by,bw,bh,12);
  gctx.save(); gctx.clip();

  // Wood grain background
  drawWoodGrain(gctx,W,H);

  // Binding strips top/bottom
  gctx.fillStyle='#c8a030';
  gctx.fillRect(0,0,W,5);
  gctx.fillRect(0,H-5,W,5);
  // Binding shimmer
  const bShim=gctx.createLinearGradient(0,0,W,0);
  bShim.addColorStop(0,'rgba(255,220,80,.0)');
  bShim.addColorStop(.5,'rgba(255,220,80,.5)');
  bShim.addColorStop(1,'rgba(255,220,80,.0)');
  gctx.fillStyle=bShim;
  gctx.fillRect(0,0,W,5);
  gctx.fillRect(0,H-5,W,5);

  // Head area (left side panel)
  const headW=60;
  const headGrad=gctx.createLinearGradient(0,0,headW,0);
  headGrad.addColorStop(0,'rgba(10,6,2,.85)');
  headGrad.addColorStop(1,'rgba(10,6,2,0)');
  gctx.fillStyle=headGrad;
  gctx.fillRect(0,0,headW,H);

  // Bridge area (right side panel)
  const bridgeGrad=gctx.createLinearGradient(W-50,0,W,0);
  bridgeGrad.addColorStop(0,'rgba(10,6,2,0)');
  bridgeGrad.addColorStop(1,'rgba(10,6,2,.8)');
  gctx.fillStyle=bridgeGrad;
  gctx.fillRect(W-50,0,50,H);

  // Nut line
  gctx.strokeStyle='#d4b840';
  gctx.lineWidth=3;
  gctx.shadowColor='rgba(212,184,64,.5)';gctx.shadowBlur=4;
  gctx.beginPath(); gctx.moveTo(headW,5); gctx.lineTo(headW,H-5); gctx.stroke();
  gctx.shadowBlur=0;

  // Bridge line
  gctx.strokeStyle='#b09030';
  gctx.lineWidth=4;
  gctx.beginPath(); gctx.moveTo(W-30,8); gctx.lineTo(W-30,H-8); gctx.stroke();

  // Fret lines
  const fretPcts=[.083,.161,.235,.305,.370,.431,.488,.541,.591,.639,.683,.724];
  const fretDots=[2,4,6,8,11];
  const strStart=headW, strEnd=W-30, strLen=strEnd-strStart;

  gctx.strokeStyle='rgba(160,140,80,.3)';
  gctx.lineWidth=1;
  fretPcts.forEach(p=>{
    const fx=strStart+p*strLen;
    gctx.beginPath(); gctx.moveTo(fx,8); gctx.lineTo(fx,H-8); gctx.stroke();
  });

  // Fret position dots
  fretDots.forEach(i=>{
    if(i<fretPcts.length){
      const fx=strStart+fretPcts[i]*strLen;
      gctx.beginPath();
      gctx.arc(fx,H/2,5,0,Math.PI*2);
      gctx.fillStyle='rgba(200,160,60,.35)';
      gctx.fill();
    }
  });

  // Pickup (dark rect)
  const puW=strLen*.08, puH=H*.55;
  const puX=strStart+strLen*.45-puW/2, puY=(H-puH)/2;
  gctx.save();
  gctx.fillStyle='#0a0806';
  roundRect(gctx,puX,puY,puW,puH,4); gctx.fill();
  // Pole pieces
  const nStrs=strs.length;
  const poleH=puH/(nStrs+1);
  for(let i=0;i<nStrs;i++){
    const py=puY+(i+1)*poleH;
    const pg=gctx.createRadialGradient(puX+puW/2,py,1,puX+puW/2,py,4);
    pg.addColorStop(0,'#6a6050'); pg.addColorStop(1,'#2a2018');
    gctx.beginPath(); gctx.arc(puX+puW/2,py,4,0,Math.PI*2);
    gctx.fillStyle=pg; gctx.fill();
  }
  gctx.restore();

  // Tuning pegs (left)
  const pegHalf=Math.ceil(strs.length/2);
  const pegPad=H/(pegHalf+1);
  for(let i=0;i<pegHalf;i++){
    drawPeg(gctx,18,(i+1)*pegPad);
  }
  for(let i=0;i<strs.length-pegHalf;i++){
    drawPeg(gctx,38,(i+1)*(H/(strs.length-pegHalf+1)));
  }

  // Strings + Y positions
  stringYs=[];
  const topPad=24, botPad=24;
  strs.forEach((str,si)=>{
    const y=topPad+(H-topPad-botPad)*si/(Math.max(strs.length-1,1));
    stringYs.push(y);
    drawString(gctx,headW,y,W-30,y,str,si);
  });

  // String labels (left of nut)
  strs.forEach((str,si)=>{
    gctx.font='bold 9px IBM Plex Mono,monospace';
    gctx.fillStyle='rgba(200,180,100,.7)';
    gctx.textAlign='right';
    gctx.fillText(`#${str.name} ${str.note}`,headW-6,stringYs[si]+3);
  });

  // Slide bar (steel)
  drawSlideBar(gctx,W,H);
  if(typeof updateBarLayerPos==='function') updateBarLayerPos();

  // Playhead marker
  if(playing && currentStep>=0){
    const px=strStart+(currentStep+.5)/numSteps*strLen;
    gctx.strokeStyle='rgba(232,196,90,.55)';
    gctx.lineWidth=1.5;
    gctx.setLineDash([3,3]);
    gctx.beginPath(); gctx.moveTo(px,8); gctx.lineTo(px,H-8); gctx.stroke();
    gctx.setLineDash([]);
  }

  // Seq note dots on strings
  if(mode==='play'){
    TUNINGS[tuning].strings.forEach((_,si)=>{
      for(let t=0;t<numSteps;t++){
        const nn=N()[si][t];
        if(nn&&nn.on){
          const dur=Math.max(1,nn.dur||1);
          const dx=strStart+(t+.5)/numSteps*strLen;
          const dy=stringYs[si];
          const isPlaying=(playing&&t===currentStep);
          // Duration bar
          if(dur>1){
            const barEnd=strStart+(t+dur)/numSteps*strLen;
            gctx.beginPath();
            gctx.moveTo(dx,dy);
            gctx.lineTo(barEnd,dy);
            gctx.strokeStyle=isPlaying?'rgba(255,220,80,.8)':'rgba(200,140,20,.4)';
            gctx.lineWidth=isPlaying?5:3;
            gctx.stroke();
          }
          // Note dot
          gctx.beginPath();
          gctx.arc(dx,dy,isPlaying?7:5,0,Math.PI*2);
          const dg=gctx.createRadialGradient(dx-1,dy-1,1,dx,dy,isPlaying?7:5);
          dg.addColorStop(0,isPlaying?'#fff':'#ffe080');
          dg.addColorStop(1,isPlaying?'#e8c040':'#c07010');
          gctx.fillStyle=dg;
          gctx.shadowColor=isPlaying?'rgba(255,220,60,.9)':'rgba(200,140,20,.5)';
          gctx.shadowBlur=isPlaying?14:6;
          gctx.fill(); gctx.shadowBlur=0;
        }
      }
    });
  }

  gctx.restore();
}

function getWood(){return WOODS[currentWood]||WOODS.maple;}

function drawWoodGrain(ctx,W,H){
  const wd=getWood();
  wd.base(ctx,W,H);

  // Grain lines
  ctx.save();
  for(let i=0;i<wd.gn;i++){
    const y=Math.random()*H;
    const alpha=Math.random()*.08+.01;
    ctx.strokeStyle=`${wd.gc}${alpha})`;
    ctx.lineWidth=Math.random()*1.5+.3;
    ctx.beginPath();ctx.moveTo(0,y);
    for(let x=0;x<W;x+=40){
      ctx.lineTo(x,y+Math.sin(x*wd.gf+i*.3)*wd.ga*(Math.random()*.5+.75));
    }
    ctx.stroke();
  }
  ctx.restore();

  // Light reflection (gloss)
  const gloss=ctx.createLinearGradient(0,0,0,H*.4);
  gloss.addColorStop(0,'rgba(255,200,100,.06)');
  gloss.addColorStop(.5,'rgba(255,200,100,.02)');
  gloss.addColorStop(1,'rgba(255,200,100,0)');
  ctx.fillStyle=gloss;
  ctx.fillRect(0,0,W,H*.4);

  // Vignette edges
  const vig=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);
}

function drawString(ctx,x1,y,x2,_y2,str,si){
  const thick=str.thick;
  // Shadow
  ctx.strokeStyle='rgba(0,0,0,.5)';
  ctx.lineWidth=thick+1.5;
  ctx.beginPath(); ctx.moveTo(x1,y+1); ctx.lineTo(x2,y+1); ctx.stroke();
  // Core string
  const sg=ctx.createLinearGradient(0,y-thick,0,y+thick);
  sg.addColorStop(0,'rgba(255,255,240,.6)');
  sg.addColorStop(.3,str.col);
  sg.addColorStop(.7,str.col);
  sg.addColorStop(1,'rgba(30,20,5,.7)');
  ctx.strokeStyle=sg;
  ctx.lineWidth=thick;
  ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke();
  // Highlight
  ctx.strokeStyle='rgba(255,250,230,.25)';
  ctx.lineWidth=thick*.3;
  ctx.beginPath(); ctx.moveTo(x1,y-thick*.2); ctx.lineTo(x2,y-thick*.2); ctx.stroke();
}

function drawPeg(ctx,x,y){
  const g=ctx.createRadialGradient(x-2,y-2,1,x,y,7);
  g.addColorStop(0,'#d0c060'); g.addColorStop(.6,'#887020'); g.addColorStop(1,'#3a2c08');
  ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(200,160,40,.4)'; ctx.lineWidth=1; ctx.stroke();
  // Center dot
  ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2);
  ctx.fillStyle='#c8a830'; ctx.fill();
}

function drawSlideBar(ctx,W,H){
  const strs=TUNINGS[tuning].strings;
  const strStart=60, strEnd=W-30, strLen=strEnd-strStart;
  slideX=strStart+slidePct*strLen;
  const barH=H-20;
  const bx=slideX-11, by=10; // centered on slideX, 22px wide

  // Draw with current bar material (wider: 22px vs old 16px)
  getBar().draw(ctx,bx,by,22,barH);

  // Pitch label above bar
  const semitones=(slidePct-.35)*28;
  ctx.font='bold 10px IBM Plex Mono,monospace';
  ctx.fillStyle='rgba(232,196,90,.9)';
  ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
  ctx.fillText((semitones>=0?'+':'')+semitones.toFixed(1)+'st',slideX,by-4);
  ctx.shadowBlur=0;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Hit particle animation
function spawnHit(x,y,col){
  for(let i=0;i<14;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*3+1;
    hitParticles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,col});
  }
  if(!animRunning) animHits();
}
let animRunning=false;
function animHits(){
  animRunning=true;
  hctx.clearRect(0,0,gc2.width,gc2.height);
  hitParticles=hitParticles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.life-=.06;
    if(p.life<=0) return false;
    hctx.globalAlpha=p.life;
    hctx.beginPath(); hctx.arc(p.x,p.y,2,0,Math.PI*2);
    hctx.fillStyle=p.col; hctx.fill();
    return true;
  });
  hctx.globalAlpha=1;
  if(hitParticles.length>0) requestAnimationFrame(animHits);
  else animRunning=false;
}

// String vibration animation
let vibratingStrings={};
function animVibration(){
  if(Object.keys(vibratingStrings).length===0) return;
  drawGuitar();
  // Draw vibration waves over strings
  const strs=TUNINGS[tuning].strings;
  const W=gc.width, strStart=60, strEnd=W-30;
  gctx.save();
  roundRect(gctx,0,0,W,gc.height,12); gctx.clip();
  Object.entries(vibratingStrings).forEach(([si,info])=>{
    const y=stringYs[+si];
    const str=strs[+si];
    const amp=info.amp*(info.t/info.maxT);
    gctx.strokeStyle=str.col;
    gctx.lineWidth=str.thick*.7;
    gctx.globalAlpha=.6;
    gctx.beginPath();
    gctx.moveTo(strStart,y);
    for(let x=strStart;x<strEnd;x+=2){
      const wave=Math.sin((x-strStart)*.08+info.phase)*amp;
      gctx.lineTo(x,y+wave);
    }
    gctx.stroke();
    gctx.globalAlpha=1;
    info.t-=1; info.phase+=.18;
    if(info.t<=0) delete vibratingStrings[si];
  });
  gctx.restore();
  // Update pedal glide smoothing every frame
  const now=performance.now();
  updatePedalPitch(now-(animVibration._last||now));
  animVibration._last=now;
  requestAnimationFrame(animVibration);
}

// Standalone pedal update loop (runs when no strings vibrating)
let _pedalLoopRunning=false;
function pedalLoop(){
  const anyActive=Object.values(pedalStates).some(Boolean);
  const anyGliding=Object.values(pedalCents).some(v=>Math.abs(v)>0.5);
  if(!anyActive&&!anyGliding){_pedalLoopRunning=false;return;}
  const now=performance.now();
  updatePedalPitch(now-(pedalLoop._last||now));
  pedalLoop._last=now;
  requestAnimationFrame(pedalLoop);
}
function startPedalLoop(){
  if(_pedalLoopRunning) return;
  _pedalLoopRunning=true;
  pedalLoop._last=performance.now();
  requestAnimationFrame(pedalLoop);
}

function getSlideX(){
  const strStart=60, strEnd=gc.width-30;
  return strStart+slidePct*(strEnd-strStart);
}

const il=document.getElementById('interact-layer');
const gWrap=document.getElementById('guitar-wrap');

function getGuitarCoords(clientX,clientY){
  const r=gWrap.getBoundingClientRect();
  return {mx:(clientX-r.left)*(gc.width/r.width),my:(clientY-r.top)*(gc.height/r.height)};
}

gWrap.addEventListener('mousedown',e=>{
  if(mode==='seq') return;
  const {mx,my}=getGuitarCoords(e.clientX,e.clientY);
  if(Math.abs(mx-getSlideX())<20&&my>4&&my<gc.height-4){
    slideDragging=true; slideStartX=e.clientX; slideStartPct=slidePct;
    gWrap.style.cursor='ew-resize';
    return;
  }
  if(mode==='play'){
    const strs=TUNINGS[tuning].strings;
    for(let si=0;si<strs.length;si++){
      if(Math.abs(my-stringYs[si])<18){pluckString(si,mx);break;}
    }
  }
});

// ── LAYER-BASED TOUCH ──
// WHY: bar-layer and string-layer are separate DOM elements with independent
// touch handlers. A finger on bar-layer only moves the bar; a finger on
// string-layer only plucks strings. No interference between the two.

const barLayer=document.getElementById('bar-layer');
const stringLayer=document.getElementById('string-layer');

// Update bar-layer hit area to match slide bar X position on each draw
function updateBarLayerPos(){
  // WHY transform instead of left/width: GPU-composited, no layout reflow = smooth
  const strStart=60, strEnd=gc.width-30;
  const barXpx=strStart+slidePct*(strEnd-strStart);
  const r=gWrap.getBoundingClientRect();
  const scale=r.width/gc.width;
  const centerPx=barXpx*scale;
  const halfW=32*scale;
  barLayer.style.left='0';
  barLayer.style.width=r.width+'px';
  // Use clip-path to define the hit area - no layout thrash
  barLayer.style.clipPath=`inset(0 ${Math.max(0,r.width-centerPx-halfW)}px 0 ${Math.max(0,centerPx-halfW)}px)`;
  barLayer.style.pointerEvents='auto';
}

// Bar layer: only handles slide drag
// WHY barTouchId: When multiple fingers are on screen (bar + plucking),
// e.touches[0] may point to the plucking finger, not the bar finger.
// We track the specific touch identifier that started on the bar.
let barTouchId=null;

barLayer.addEventListener('touchstart',e=>{
  if(mode==='seq') return;
  e.preventDefault(); e.stopPropagation();
  // Only grab first new touch on bar layer
  if(barTouchId===null){
    const t=e.changedTouches[0];
    barTouchId=t.identifier;
    slideDragging=true;
    slideStartX=t.clientX;
    slideStartPct=slidePct;
  }
},{passive:false});

barLayer.addEventListener('touchmove',e=>{
  if(!slideDragging||barTouchId===null) return;
  e.preventDefault(); e.stopPropagation();
  // Find the specific touch that controls the bar
  let barTouch=null;
  for(let i=0;i<e.touches.length;i++){
    if(e.touches[i].identifier===barTouchId){barTouch=e.touches[i];break;}
  }
  if(!barTouch) return;
  const r=gWrap.getBoundingClientRect();
  const strLen=gc.width-90;
  const dx=(barTouch.clientX-slideStartX)*(gc.width/r.width);
  slidePct=Math.max(0,Math.min(1,slideStartPct+dx/strLen));
  updateSlideFX(); schedDraw();
},{passive:false});

barLayer.addEventListener('touchend',e=>{
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===barTouchId){
      slideDragging=false; barTouchId=null; break;
    }
  }
},{passive:false});

// String layer: only handles plucking (all fingers)
stringLayer.addEventListener('touchstart',e=>{
  if(mode!=='play') return;
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const {mx,my}=getGuitarCoords(t.clientX,t.clientY);
    TUNINGS[tuning].strings.forEach((_,si)=>{
      if(Math.abs(my-stringYs[si])<22) pluckString(si,mx);
    });
  }
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(durDragging){
    const dx=e.touches[0].clientX-durStartX;
    const newDur=Math.max(1,Math.min(numSteps-durT, durStartDur+Math.round(dx/(CELL_W+2))));
    if(newDur!==N()[durSi][durT].dur){
      N()[durSi][durT].dur=newDur;
      renderNoteBlock(durSi,durT);
    }
    e.preventDefault();
    return;
  }
},{passive:false});
document.addEventListener('touchend',()=>{slideDragging=false;gWrap.style.cursor='';durDragging=false;});
document.addEventListener('mousemove',e=>{
  if(durDragging){
    const dx=e.clientX-durStartX;
    const newDur=Math.max(1,Math.min(numSteps-durT, durStartDur+Math.round(dx/(CELL_W+2))));
    if(newDur!==N()[durSi][durT].dur){
      N()[durSi][durT].dur=newDur;
      renderNoteBlock(durSi,durT);
      if(mode==='play') drawGuitar();
    }
    return;
  }
  if(!slideDragging) return;
  const r=gWrap.getBoundingClientRect();
  const strLen=gc.width-90;
  const dx=(e.clientX-slideStartX)*(gc.width/r.width);
  slidePct=Math.max(0,Math.min(1,slideStartPct+dx/strLen));
  updateSlideFX();
  schedDraw();
});
document.addEventListener('mouseup',()=>{
  if(slideDragging){slideDragging=false;gWrap.style.cursor='';}
  seqDragging=false; velDragging=false; durDragging=false;
});

function updateSlideFX(){
  const s=(slidePct-.35)*28;
  FX.pb=s;
  document.getElementById('pitch-big').textContent=(s>=0?'+':'')+s.toFixed(1);
  document.getElementById('fv-pb').textContent=(s>=0?'+':'')+s.toFixed(1)+'st';
}

function pluckString(si,hitX){
  if(!ctx_a){ctx_a=new (window.AudioContext||window.webkitAudioContext)();buildReverb().catch(console.error);}
  const str=TUNINGS[tuning].strings[si];

  const bar=getBar();
  const barTone=(FX.tn-.5)*18+(bar.highShelf||0)*3+(bar.mid||0)*1.5;
  // WHY add pedalCents[si]: pedal pitch offset is smoothed per-string, adds to bar position
  const pOffset=pedalCents[si]||0;
  playNote(str.freq,1.0*(bar.atkM||1),semitones*100+pOffset,barTone,1.4*(bar.susM||1));
  // Particles
  const r=gc2.getBoundingClientRect();
  const sy=stringYs[si]*(r.height/gc2.height);
  const sx=(hitX||getSlideX())*(r.width/gc2.width);
  spawnHit(hitX||getSlideX(),stringYs[si],str.col);
  // Vibration
  // TEST: animVibration disabled to check if Canvas draw causes slide jank
  // const had=!!vibratingStrings[si];
  // vibratingStrings[si]={amp:8-si*0.5,t:40,maxT:40,phase:0};

}

const CELL_W=26;

function buildSeqGrid(){
  initNotes(tuning);
  const g=document.getElementById('seq-grid'); g.innerHTML='';
  TUNINGS[tuning].strings.forEach((str,si)=>{
    const row=document.createElement('div'); row.className='srow';
    const lbl=document.createElement('div'); lbl.className='slbl';
    lbl.textContent=`#${str.name} ${str.note}`; row.appendChild(lbl);
    const cells=document.createElement('div');
    cells.style.cssText='position:relative;display:flex;gap:2px;';
    for(let t=0;t<numSteps;t++){
      const c=document.createElement('div');
      c.className='scell'+(t%4===0?' b4':'');
      c.dataset.si=si; c.dataset.t=t;
      c.addEventListener('mousedown',seqDown);
      c.addEventListener('touchstart',seqTouchStart,{passive:false});
      c.addEventListener('mouseenter',seqEnter);
      cells.appendChild(c);
    }
    row.appendChild(cells);
    g.appendChild(row);
  });
  renderAllNoteBlocks();
  buildVelRow();
}

function renderAllNoteBlocks(){
  TUNINGS[tuning].strings.forEach((_,si)=>{
    for(let t=0;t<numSteps;t++) renderNoteBlock(si,t);
  });
}

function renderNoteBlock(si,t){
  const n=N()[si][t];
  const cellEl=document.querySelector(`.scell[data-si="${si}"][data-t="${t}"]`);
  if(!cellEl) return;
  cellEl.classList.remove('on');
  const old=cellEl.querySelector('.note-block');
  if(old) old.remove();
  if(!n.on) return;
  const dur=Math.max(1,n.dur||1);
  const blockW=dur*CELL_W+(dur-1)*2;
  const block=document.createElement('div');
  block.className='note-block';
  block.style.cssText=`position:absolute;left:0;top:1px;height:calc(100% - 2px);width:${blockW}px;
    background:linear-gradient(to right,#e8922a,#c87010);
    border-radius:3px;border:1px solid #f8b840;
    box-shadow:0 0 6px rgba(232,146,42,.5);pointer-events:none;z-index:2;overflow:hidden;`;
  // Drag handle (desktop only - small indicator)
  const handle=document.createElement('div');
  handle.className='dur-handle';
  handle.style.cssText=`position:absolute;right:0;top:0;bottom:0;width:6px;cursor:ew-resize;
    background:rgba(255,220,80,.4);border-radius:0 2px 2px 0;pointer-events:all;`;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault(); e.stopPropagation();
    durDragging=true; durSi=si; durT=t;
    durStartX=e.clientX; durStartDur=n.dur||1;
  });
  block.appendChild(handle);
  cellEl.style.position='relative';
  cellEl.appendChild(block);
}

function seqDown(e){
  if(e.target.classList.contains('dur-handle')) return;
  e.preventDefault(); seqDragging=true;
  const si=+this.dataset.si, t=+this.dataset.t;
  seqDragVal=!N()[si][t].on;
  toggleNote(si,t,seqDragVal);
  selectedString=si; buildVelRow();
}
function seqTouchStart(e){
  e.preventDefault();
  const cell=this;
  const si=+cell.dataset.si, t=+cell.dataset.t;
  const touchX=e.touches[0].clientX;
  const touchY=e.touches[0].clientY;
  let longPressTimer=null;
  let isDurMode=false;
  let moved=false;

  // Long press timer (500ms) → duration mode
  let currentTouchX=touchX;
  longPressTimer=setTimeout(()=>{
    if(!N()[si][t].on) return; // only stretch existing notes
    isDurMode=true;
    durDragging=true; durSi=si; durT=t;
    durStartX=currentTouchX; // use current finger position
    durStartDur=N()[si][t].dur||1;
    moved=false; // reset moved so swipe is clean
    if(navigator.vibrate) navigator.vibrate(40);
    cell.style.outline='2px solid #fff';
    setTimeout(()=>cell.style.outline='',300);
  },500);

  const onMove=ev=>{
    currentTouchX=ev.touches[0].clientX;
    const dx=Math.abs(ev.touches[0].clientX-touchX);
    const dy=Math.abs(ev.touches[0].clientY-touchY);
    if(dx>8||dy>8) moved=true;

    // Cancel long press if moved too much vertically
    if(dy>12&&!isDurMode){
      clearTimeout(longPressTimer);
      longPressTimer=null;
    }

    if(isDurMode&&durDragging){
      const dragDx=ev.touches[0].clientX-durStartX;
      const newDur=Math.max(1,Math.min(numSteps-t, durStartDur+Math.round(dragDx/(CELL_W+2))));
      if(newDur!==N()[si][t].dur){
        N()[si][t].dur=newDur;
        renderNoteBlock(si,t);
        if(mode==='play') drawGuitar();
      }
      ev.preventDefault();
      return;
    }

    // Drag to paint cells (if not dur mode)
    if(!isDurMode&&moved&&seqDragging){
      const el=document.elementFromPoint(ev.touches[0].clientX,ev.touches[0].clientY);
      if(el&&el.classList.contains('scell')&&el!==cell){
        toggleNote(+el.dataset.si,+el.dataset.t,seqDragVal);
      }
    }
  };

  const touchStartTime=Date.now();
  const onEnd=()=>{
    clearTimeout(longPressTimer);
    const elapsed=Date.now()-touchStartTime;
    if(!isDurMode&&!moved&&elapsed<450){
      seqDragging=true;
      seqDragVal=!N()[si][t].on;
      toggleNote(si,t,seqDragVal);
      selectedString=si; buildVelRow();
    }
    isDurMode=false; durDragging=false; seqDragging=false;
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
  };

  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}
function seqEnter(){
  if(!seqDragging||durDragging) return;
  toggleNote(+this.dataset.si,+this.dataset.t,seqDragVal);
}
function toggleNote(si,t,val){
  N()[si][t].on=val;
  if(!val) N()[si][t].dur=1;
  renderNoteBlock(si,t);
  updateVB(si,t);
  if(mode==='play') drawGuitar();
}
function buildVelRow(){
  const vr=document.getElementById('vel-row'); vr.innerHTML='';
  for(let t=0;t<numSteps;t++){
    const w=document.createElement('div'); w.className='vbw'; w.dataset.t=t;
    const b=document.createElement('div');
    b.className='vbi'+(N()[selectedString][t].on?' lit':'');
    b.id=`vb-${t}`; b.style.height=(N()[selectedString][t].vel/127*100)+'%';
    w.appendChild(b);
    w.addEventListener('mousedown',vDown); w.addEventListener('mousemove',vMove);
    vr.appendChild(w);
  }
}
function vDown(e){velDragging=true;setV(e,this);}
function vMove(e){if(!velDragging)return;setV(e,this);}
function setV(e,w){
  const t=+w.dataset.t,r=w.getBoundingClientRect();
  const p=1-Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
  N()[selectedString][t].vel=Math.round(p*127);
  if(p>.02){N()[selectedString][t].on=true;toggleNote(selectedString,t,true);}
  updateVB(selectedString,t);
}
function updateVB(si,t){
  if(si!==selectedString)return;
  const b=document.getElementById(`vb-${t}`); if(!b)return;
  b.style.height=(N()[si][t].vel/127*100)+'%';
  b.className='vbi'+(N()[si][t].on?' lit':'');
}

// ════════════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════════════
// ════════════════════════════════════════════════
// AUDIO - AudioWorklet based Karplus-Strong
// WHY AudioWorklet: Karplus-Strong runs on the audio thread (not main thread).
// This eliminates the jank caused by buffer generation blocking touch events.
// Same architecture as JUCE's processBlock() - good practice for DAW port.
// ════════════════════════════════════════════════

// AudioWorklet processor code as inline string (no separate file needed)
const KS_WORKLET_CODE=`
class KarplusStrongProcessor extends AudioWorkletProcessor {
  static get parameterDescriptors(){
    return [
      {name:'freq',       defaultValue:440,  minValue:20,   maxValue:8000},
      {name:'gain',       defaultValue:0.5,  minValue:0,    maxValue:2},
      {name:'brightness', defaultValue:0.5,  minValue:0,    maxValue:1},
      {name:'sustain',    defaultValue:0.5,  minValue:0,    maxValue:1}
    ];
  }
  constructor(){
    super();
    this._active=false;
    this._buf=null;
    this._pos=0;
    this._env=0;
    this._envDecay=0.9995;
    this._age=0;
    this._maxAge=0;
    this.port.onmessage=e=>{
      if(e.data.type==='pluck'){
        const {freq,sampleRate,brightness,sustain}=e.data;
        const size=Math.max(2,Math.round(sampleRate/freq));
        this._buf=new Float32Array(size);
        // Fill with filtered noise (brightness controls initial spectrum)
        for(let i=0;i<size;i++) this._buf[i]=(Math.random()*2-1);
        // Simple low-pass pre-filter on initial buffer
        const b=Math.max(0.1,Math.min(0.99,brightness));
        for(let i=1;i<size;i++) this._buf[i]=this._buf[i]*(b)+(this._buf[i-1])*(1-b);
        this._pos=0;
        this._env=1.0;
        this._envDecay=0.9998+sustain*0.0001; // sustain affects decay rate
        this._age=0;
        this._maxAge=sampleRate*(0.5+sustain*3); // max 3.5s
        this._active=true;
      }
    };
  }
  process(inputs,outputs,parameters){
    if(!this._active||!this._buf) return true;
    const out=outputs[0][0];
    const size=this._buf.length;
    const gain=parameters.gain[0];
    // Karplus-Strong loop: feedback + low-pass averaging
    const fb=0.996; // feedback coefficient
    for(let i=0;i<out.length;i++){
      const curr=this._buf[this._pos];
      const next=this._buf[(this._pos+1)%size];
      // Low-pass: average current + next sample (classic KS)
      this._buf[this._pos]=(curr+next)*0.5*fb;
      out[i]=curr*this._env*gain;
      this._env*=this._envDecay;
      this._pos=(this._pos+1)%size;
      this._age++;
    }
    if(this._age>=this._maxAge||this._env<0.0001){
      this._active=false;
      out.fill(0);
    }
    return true;
  }
}
registerProcessor('karplus-strong',KarplusStrongProcessor);
`;

// Register worklet from inline blob
let workletReady=false;
let workletReadyPromise=null;

async function ensureWorklet(){
  if(workletReady) return;
  if(workletReadyPromise) return workletReadyPromise;
  const blob=new Blob([KS_WORKLET_CODE],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  workletReadyPromise=ctx_a.audioWorklet.addModule(url).then(()=>{
    workletReady=true;
    URL.revokeObjectURL(url);
  });
  return workletReadyPromise;
}

async function buildReverb(){
  const sr=ctx_a.sampleRate,len=sr*2.8;
  const buf=ctx_a.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){const ch=buf.getChannelData(c);for(let i=0;i<len;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
  reverbConv=ctx_a.createConvolver(); reverbConv.buffer=buf;
  reverbGain=ctx_a.createGain(); reverbGain.gain.value=FX.rv;
  dryGain=ctx_a.createGain(); dryGain.gain.value=1-FX.rv*.5;
  reverbConv.connect(reverbGain); reverbGain.connect(ctx_a.destination);
  dryGain.connect(ctx_a.destination);
  // Pre-register worklet while reverb builds
  await ensureWorklet();
  await buildVoicePool(); // WHY here: pool needs reverb nodes to connect to
}

// Voice pool: AudioWorkletNode instances (pre-allocated, no per-note creation)
const VOICE_POOL_SIZE=8;
let voicePool=null;
let voiceIdx=0;

async function buildVoicePool(){
  await ensureWorklet();
  voicePool=[];
  const dest=dryGain||ctx_a.destination;
  for(let i=0;i<VOICE_POOL_SIZE;i++){
    // Each voice: KarplusStrongWorklet → toneFilter → midFilter → highFilter → env → dest
    const ksNode=new AudioWorkletNode(ctx_a,'karplus-strong');
    const toneFilter=ctx_a.createBiquadFilter();
    toneFilter.type='lowpass'; toneFilter.Q.value=0.8;
    const midFilter=ctx_a.createBiquadFilter();
    midFilter.type='peaking'; midFilter.frequency.value=800; midFilter.Q.value=1.0;
    const highFilter=ctx_a.createBiquadFilter();
    highFilter.type='highshelf'; highFilter.frequency.value=3000;
    const env=ctx_a.createGain(); env.gain.value=0;
    ksNode.connect(toneFilter);
    toneFilter.connect(midFilter);
    midFilter.connect(highFilter);
    highFilter.connect(env);
    env.connect(dest);
    if(reverbConv) env.connect(reverbConv);
    voicePool.push({ksNode,toneFilter,midFilter,highFilter,env});
  }
}

function playNote(freq,velN,centsOff,fgain,dur){
  if(!ctx_a||!voicePool) return;
  const vol=Math.pow(10,FX.out/20)*.5*velN;
  const now=ctx_a.currentTime;
  const f=freq*Math.pow(2,centsOff/1200);

  // Round-robin voice selection
  const v=voicePool[voiceIdx%VOICE_POOL_SIZE]; voiceIdx++;

  // Update filter params (no allocation)
  const wd=getWood();
  const bar=getBar();
  v.toneFilter.frequency.setValueAtTime(wd.ffreq+(fgain||0)*60,now);
  v.midFilter.gain.setValueAtTime((wd.mid||0)+(bar.mid||0),now);
  v.highFilter.gain.setValueAtTime((wd.highShelf||0)+(bar.highShelf||0),now);

  // Envelope
  const atk=0.001*(wd.atkM||1)*(bar.atkM||1);
  v.env.gain.cancelScheduledValues(now);
  v.env.gain.setValueAtTime(0,now);
  v.env.gain.linearRampToValueAtTime(vol,now+atk);
  v.env.gain.setTargetAtTime(vol*.7,now+atk,.08*(wd.susM||1)*(bar.susM||1));
  v.env.gain.setTargetAtTime(0,now+dur*.5,dur*.35*(wd.susM||1));

  // WHY postMessage: triggers Karplus-Strong on audio thread (not main thread).
  // No buffer allocation on main thread - zero jank.
  const brightness=Math.max(0.1,Math.min(0.99,(wd.ffreq||2200)/4000));
  v.ksNode.port.postMessage({
    type:'pluck',
    freq:f,
    sampleRate:ctx_a.sampleRate,
    brightness,
    sustain:(wd.susM||1)-0.5
  });
}
// ════════════════════════════════════════════════
// SEQUENCER PLAYBACK
// ════════════════════════════════════════════════
function getBPM(){return Math.max(40,Math.min(240,parseFloat(document.getElementById('bpm-in').value)||90));}

function startSeq(){
  if(!ctx_a){ctx_a=new (window.AudioContext||window.webkitAudioContext)();buildReverb().catch(console.error);}
  playing=true;currentStep=0;vibratoPhase=0;pitchCurrent=0;
  scheduleStep();animVU();
  document.getElementById('play-ico').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}
function stopSeq(){
  playing=false;currentStep=-1;
  if(stepTimer)clearTimeout(stepTimer);
  clearPH();
  document.getElementById('bdisp').textContent='—';
  document.getElementById('vu-fill').style.width='0%';
  document.getElementById('play-ico').innerHTML='<polygon points="5,3 19,12 5,21"/>';
  drawGuitar();
}
function scheduleStep(){
  if(!playing)return;
  const bpm=getBPM(),ss=60/bpm/4;
  const strs=TUNINGS[tuning].strings;
  clearPH();
  document.querySelectorAll(`.scell[data-t="${currentStep}"]`).forEach(el=>el.classList.add('ph'));
  document.getElementById('bdisp').textContent=`${Math.floor(currentStep/4)+1}.${(currentStep%4)+1}`;

  vibratoPhase+=FX.vr*ss;
  const vib=FX.vd*60*Math.sin(vibratoPhase*2*Math.PI);
  pitchCurrent+=(FX.pb-pitchCurrent)*(1-Math.exp(-ss/(FX.gl*.001+.001)));
  const tc=pitchCurrent*100+vib;
  document.getElementById('pitch-big').textContent=(pitchCurrent>=0?'+':'')+pitchCurrent.toFixed(1);

  const fg=(FX.tn-.5)*18;
  strs.forEach((str,si)=>{
    const nn=N()[si][currentStep];
    // WHY per-string MIDI channel: MPE-style, ch=si+1 (1-indexed).
    // Allows DAW to track pitch bend and pedal state per string independently.
    const midiCh=si; // 0-indexed for send functions (ch 0-5 = MIDI ch 1-6)
    const pOffset=pedalCents[si]||0;
    const totalCents=tc+pOffset;
    // Send pitch bend for this string's channel
    sendPitchBend(midiCh, totalCents);
    // Send CC64 (sustain) as pedal indicator - 127=on, 0=off
    const pedalOn=Object.keys(PEDAL_TARGETS).some(k=>
      pedalStates[k]&&PEDAL_TARGETS[k].strings.includes(si)
    );
    sendCC(midiCh, 64, pedalOn?127:0);
    if(nn&&nn.on){
      const dur=Math.max(1,nn.dur||1);
      playNote(str.freq,nn.vel/127,totalCents,fg,ss*dur*1.8);
      const had=!!vibratingStrings[si];
      vibratingStrings[si]={amp:7-si*.3,t:30,maxT:30,phase:0};
      if(!had) animVibration();
      spawnHit(getSlideX(),stringYs[si]||0,str.col);
    }
  });
  drawGuitar();

  currentStep=(currentStep+1)%numSteps;
  if(currentStep===0&&oneShot&&!loopOn){stopSeq();return;}
  stepTimer=setTimeout(scheduleStep,ss*1000-4);
}
function clearPH(){document.querySelectorAll('.scell.ph').forEach(el=>el.classList.remove('ph'));}

function animVU(){
  if(!playing)return;
  const t=performance.now()*.001;
  const s=.5+Math.sin(t*2.1)*.22+Math.sin(t*5.3)*.1;
  document.getElementById('vu-fill').style.width=Math.min(100,s*Math.pow(10,FX.out/20)*72)+'%';
  requestAnimationFrame(animVU);
}

let currentSlot='A';

function saveSlot(){
  const key=`sgfx_slot_${currentSlot}`;
  const data={tuning,numSteps,notes:notesData[tuning]};
  try{
    localStorage.setItem(key,JSON.stringify(data));
    // Flash button feedback
    const btn=document.getElementById(`slot-${currentSlot}`);
    const orig=btn.textContent;
    btn.textContent='✓';
    btn.style.background='#2a6a2a';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';},800);
  }catch(e){alert('Save failed');}
}

function loadSlot(slot,btn){
  currentSlot=slot;
  document.querySelectorAll('.slot-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const key=`sgfx_slot_${slot}`;
  try{
    const raw=localStorage.getItem(key);
    if(!raw){
      // Empty slot - just clear
      clearAll(); return;
    }
    const data=JSON.parse(raw);
    // Restore tuning if different
    if(data.tuning&&data.tuning!==tuning){
      tuning=data.tuning;
      document.querySelectorAll('.hbtn[id^="t-"]').forEach(b=>b.classList.remove('on'));
      document.getElementById('t-'+(tuning==='lap6'?'lap':'e9')).classList.add('on');
    }
    // Restore steps
    if(data.numSteps&&data.numSteps!==numSteps){
      numSteps=data.numSteps;
      document.getElementById('step-sel').value=numSteps;
    }
    // Restore notes
    if(data.notes){
      notesData[tuning]=data.notes;
      // Ensure all cells exist
      TUNINGS[tuning].strings.forEach((_,si)=>{
        for(let t=0;t<numSteps;t++){
          if(!notesData[tuning][si][t]) notesData[tuning][si][t]={on:false,vel:100,dur:1};
        }
      });
    }
    buildSeqGrid(); drawGuitar();
  }catch(e){clearAll();}
}

// Auto-save current pattern when navigating away
window.addEventListener('beforeunload',()=>{
  try{
    const key=`sgfx_slot_${currentSlot}`;
    const data={tuning,numSteps,notes:notesData[tuning]};
    localStorage.setItem(key,JSON.stringify(data));
    // Also save last slot
    localStorage.setItem('sgfx_lastSlot',currentSlot);
  }catch(e){}
});

// ════════════════════════════════════════════════
// MIDI EXPORT
// ════════════════════════════════════════════════
function exportMIDI(){
  // WHY format 1 (multi-track): Each string gets its own MIDI track+channel.
  // This enables MPE-style per-string pitch bend in DAW (Studio One, Cubase etc).
  // MIDI_BEND_RANGE constant must match DAW's pitch bend range setting (default:12).
  const bpm=getBPM();
  const TPB=480; // ticks per beat
  const MPB=Math.round(60000000/bpm); // microseconds per beat
  const strs=TUNINGS[tuning].strings;

  function freqToMidi(f){return Math.round(69+12*Math.log2(f/440));}

  function writeVarLen(v){
    const b=[]; b.unshift(v&0x7f); v>>=7;
    while(v>0){b.unshift((v&0x7f)|0x80);v>>=7;} return b;
  }

  function buildTrack(events){
    // events: [{tick, bytes:[]}]
    events.sort((a,b)=>a.tick-b.tick);
    const tb=[]; let last=0;
    events.forEach(ev=>{
      const d=ev.tick-last; last=ev.tick;
      writeVarLen(d).forEach(b=>tb.push(b));
      ev.bytes.forEach(b=>tb.push(b));
    });
    tb.push(0,0xff,0x2f,0); // end of track
    return tb;
  }

  function bendBytes(ch, cents){
    // WHY: Convert cents to MIDI pitch bend value based on MIDI_BEND_RANGE
    const norm=(cents/100)/MIDI_BEND_RANGE;
    const val=Math.round(norm*8191+8192);
    const lsb=val&0x7f, msb=(val>>7)&0x7f;
    return [0xE0|(ch&0xf), lsb, msb];
  }

  // Track 0: tempo map
  const tempoTrack=buildTrack([
    {tick:0,bytes:[0xff,0x51,0x03,(MPB>>16)&0xff,(MPB>>8)&0xff,MPB&0xff]}
  ]);

  // Tracks 1..N: one per string
  const stringTracks=strs.map((str,si)=>{
    const ch=si; // MIDI ch 0-indexed (ch 0 = MIDI ch 1)
    const midiNote=freqToMidi(str.freq);
    const events=[];

    // Pitch bend: BEND_RANGE setting message (RPN 0)
    // WHY: Tells DAW this channel uses ±MIDI_BEND_RANGE semitones
    events.push({tick:0,bytes:[0xB0|ch,101,0]}); // RPN MSB
    events.push({tick:0,bytes:[0xB0|ch,100,0]}); // RPN LSB
    events.push({tick:0,bytes:[0xB0|ch,6,MIDI_BEND_RANGE]}); // data entry MSB = range
    events.push({tick:0,bytes:[0xB0|ch,38,0]}); // data entry LSB
    events.push({tick:0,bytes:[0xB0|ch,101,127]}); // RPN null
    events.push({tick:0,bytes:[0xB0|ch,100,127]});
    // Initial bend = center
    events.push({tick:0,bytes:bendBytes(ch,0)});

    for(let t=0;t<numSteps;t++){
      const nn=notesData[tuning][si][t];
      if(!nn||!nn.on) continue;
      const dur=Math.max(1,nn.dur||1);
      const vel=Math.max(1,Math.min(127,nn.vel||100));
      const startTick=t*TPB/4;
      const endTick=startTick+dur*TPB/4-1;
      // Slide bar pitch at this step
      const barCents=(slidePct-.35)*28*100;
      // Pedal offset for this string
      const pOffset=pedalCents[si]||0;
      const totalCents=barCents+pOffset;
      // Emit pitch bend before note on
      events.push({tick:startTick,bytes:bendBytes(ch,totalCents)});
      events.push({tick:startTick,bytes:[0x90|ch,midiNote,vel]});
      events.push({tick:endTick,bytes:[0x80|ch,midiNote,0]});
    }
    return buildTrack(events);
  });

  // Assemble MIDI file (format 1)
  const allTracks=[tempoTrack,...stringTracks];
  const numTracks=allTracks.length;
  const header=[
    0x4d,0x54,0x68,0x64,0,0,0,6, // MThd
    0,1,                          // format 1
    (numTracks>>8)&0xff,numTracks&0xff,
    (TPB>>8)&0xff,TPB&0xff
  ];
  const trackChunks=allTracks.flatMap(tb=>[
    0x4d,0x54,0x72,0x6b,          // MTrk
    (tb.length>>24)&0xff,(tb.length>>16)&0xff,(tb.length>>8)&0xff,tb.length&0xff,
    ...tb
  ]);

  const midiBytes=new Uint8Array([...header,...trackChunks]);
  const blob=new Blob([midiBytes],{type:'audio/midi'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`steelguitar_${tuning}_${currentSlot}_ch.mid`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── PEDAL PITCH GLIDE UPDATE ──
// WHY: Called every animation frame to smoothly glide pedalCents toward target.
// Uses same FX.gl glide time as the pitch bend slider for consistency.
function updatePedalPitch(dt){
  Object.keys(PEDAL_TARGETS).forEach(key=>{
    const pd=PEDAL_TARGETS[key];
    const target=pedalStates[key]?pd.cents:0;
    pd.strings.forEach(si=>{
      const cur=pedalCents[si]||0;
      // Exponential smoothing - same approach as pitchCurrent glide
      const glideMs=(FX.gl||0.5)*400+20;
      const alpha=1-Math.exp(-dt/glideMs);
      pedalCents[si]=cur+(target-cur)*alpha;
    });
  });
}

// ── MIDI INPUT ──
// WHY: Allows external MIDI pads to trigger pedals.
// Note 36 (C1) = Pedal A, Note 38 (D1) = Pedal B.
// ノートON→ペダルON、ノートOFF→ペダルOFF。
function onMIDIMessage(msg){
  const [status,note,velocity]=msg.data;
  const type=status&0xf0;
  const on=(type===0x90&&velocity>0);
  const off=(type===0x80||(type===0x90&&velocity===0));
  if(note===36){pedalStates.A=(on?true:off?false:pedalStates.A); updatePedalBtnUI(); startPedalLoop();}
  if(note===38){pedalStates.B=(on?true:off?false:pedalStates.B); updatePedalBtnUI(); startPedalLoop();}
}
function initMIDI(){
  if(!navigator.requestMIDIAccess) return;
  navigator.requestMIDIAccess({sysex:false}).then(access=>{
    function connectInputs(){
      access.inputs.forEach(input=>{input.onmidimessage=onMIDIMessage;});
    }
    connectInputs();
    initMIDIOutput(access); // WHY: also grab output for DAW pitch bend / CC send
    access.onstatechange=()=>{connectInputs(); initMIDIOutput(access);};
  }).catch(()=>{});
}
initMIDI();
