<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Steel Guitar FX">
<meta name="theme-color" content="#080604">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Steel Guitar FX</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080604;
  --panel:#100d08;
  --border:#2e2414;
  --amber:#c8922a;
  --gold:#e8c45a;
  --cream:#ede0c4;
  --dim:#2a1e0c;
  --rust:#7a3010;
  --glow:rgba(232,196,90,.35);
  --binding:#d4a830;
  --chrome:#d8d0b8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:'IBM Plex Mono',monospace;overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5;}

.app{display:flex;flex-direction:column;height:100vh;padding:8px 12px 6px;}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-shrink:0;}
.logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;color:var(--gold);letter-spacing:.1em;text-shadow:0 0 16px var(--glow);}
.logo i{font-style:italic;color:var(--amber);}
.hbtn{padding:3px 9px;font-size:9px;letter-spacing:.12em;background:var(--panel);border:1px solid var(--border);color:var(--cream);cursor:pointer;border-radius:3px;transition:all .13s;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.hbtn.on{background:var(--amber);color:#000;border-color:var(--gold);}
.sp{flex:1;}

/* Transport */
.tp{display:flex;align-items:center;gap:7px;flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:5px 10px;margin-bottom:7px;}
.tbtn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;}
.tbtn.pb{background:radial-gradient(circle at 40% 35%,var(--amber),#5a1e04);box-shadow:0 0 12px rgba(200,146,42,.45);}
.tbtn.sb{background:var(--dim);border:1px solid var(--border);}
.tbtn svg{width:16px;height:16px;fill:#fff;}
.tbtn.sb svg{fill:var(--amber);}
.ts{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.tl{font-size:8px;color:var(--amber);letter-spacing:.12em;text-transform:uppercase;}
.ti{width:52px;background:var(--bg);border:1px solid var(--border);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:14px;text-align:center;border-radius:3px;padding:4px 0;}
.tsl{background:var(--bg);border:1px solid var(--border);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:3px;padding:4px 6px;}
.lbtn{padding:6px 10px;font-size:9px;letter-spacing:.1em;background:var(--dim);border:1px solid var(--border);color:var(--amber);cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;transition:all .13s;text-transform:uppercase;}
.lbtn.on{border-color:var(--gold);color:var(--gold);}
.bd{font-size:14px;color:var(--gold);letter-spacing:.05em;min-width:46px;text-align:right;text-shadow:0 0 10px var(--glow);margin-left:auto;}

/* Body */
.body{display:flex;gap:8px;flex:1;min-height:0;}

/* Center */
.center{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}

/* Mode toggle */
.mode-bar{display:flex;gap:3px;flex-shrink:0;}
.mbtn{padding:3px 11px;font-size:9px;letter-spacing:.13em;background:var(--panel);border:1px solid var(--border);color:var(--cream);opacity:.55;cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;transition:all .12s;text-transform:uppercase;}
.mbtn.on{opacity:1;border-color:var(--amber);color:var(--gold);}

/* Guitar canvas wrapper */
.guitar-wrap{flex:1;position:relative;border-radius:14px;overflow:hidden;min-height:0;
  box-shadow:0 0 0 3px var(--binding),0 0 0 5px #1a1000,0 0 0 7px #a07820,0 12px 48px rgba(0,0,0,.75);}
#guitar-canvas{display:block;width:100%;height:100%;}

/* String hit overlay */
.hit-canvas{position:absolute;inset:0;pointer-events:none;}
.interact-layer{position:absolute;inset:0;pointer-events:all;cursor:crosshair;touch-action:none;-webkit-user-select:none;user-select:none;}

/* Sequencer overlay */
.seq-overlay{position:absolute;inset:0;background:rgba(5,4,2,.92);border-radius:11px;display:none;flex-direction:column;padding:8px 6px 6px;overflow:hidden;}
.seq-overlay.open{display:flex;}
.seq-scroll{flex:1;overflow:auto;}
.seq-scroll::-webkit-scrollbar{width:4px;height:4px;}
.seq-scroll::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.seq-grid{display:flex;flex-direction:column;gap:3px;min-width:max-content;}
.srow{display:flex;align-items:center;gap:2px;}
.slbl{width:48px;flex-shrink:0;font-size:9px;color:var(--amber);text-align:right;padding-right:5px;white-space:nowrap;}
.scell{width:26px;height:22px;border-radius:2px;background:#18120a;border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:background .1s;}
.scell:hover{border-color:var(--amber);}
.scell.on{background:var(--amber);border-color:var(--gold);}
.scell.ph{outline:2px solid var(--gold);outline-offset:-2px;}
.b4{border-left:2px solid #3a2a10!important;}
.vel-row{display:flex;gap:2px;margin-left:50px;margin-top:3px;height:26px;}
.vbw{width:26px;flex-shrink:0;height:100%;display:flex;align-items:flex-end;cursor:ns-resize;}
.vbi{width:100%;background:var(--dim);border-radius:1px 1px 0 0;min-height:2px;}
.vbi.lit{background:linear-gradient(to top,var(--amber),var(--gold));}
.seq-close{flex-shrink:0;text-align:right;margin-bottom:4px;}
.seq-close button{padding:2px 8px;font-size:9px;background:var(--dim);border:1px solid var(--border);color:var(--amber);cursor:pointer;border-radius:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;}

/* FX panel */
.fx{width:146px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.fbox{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:9px 8px;display:flex;flex-direction:column;gap:6px;}
.fhd{font-size:8px;letter-spacing:.22em;color:var(--amber);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:3px;}
.frow{display:flex;flex-direction:column;gap:2px;}
.ftop{display:flex;justify-content:space-between;}
.fn{font-size:8px;color:var(--cream);opacity:.6;letter-spacing:.06em;text-transform:uppercase;}
.fv{font-size:9px;color:var(--gold);min-width:42px;text-align:right;}
.fsl{width:100%;-webkit-appearance:none;appearance:none;height:3px;background:var(--dim);border-radius:2px;outline:none;cursor:pointer;}
.fsl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--gold),var(--amber));box-shadow:0 0 4px var(--glow);}
.pitch-big{text-align:center;font-size:18px;color:var(--gold);text-shadow:0 0 14px var(--glow);}
.vu-b{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;}
.vu-f{height:100%;width:0%;background:linear-gradient(to right,#5c9,var(--gold),#c43);border-radius:2px;transition:width .04s;}
.clr{width:100%;padding:4px;background:transparent;border:1px solid var(--rust);color:#a05030;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .13s;margin-top:2px;}
.clr:hover{background:var(--rust);color:#fff;}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="logo">Steel <i>Guitar</i> FX</div>
  <button class="hbtn on" id="t-lap" onclick="setTuning('lap6',this)">LAP 6</button>
  <button class="hbtn"    id="t-e9"  onclick="setTuning('e9',this)">E9 PEDAL</button>
  <div class="sp"></div>
</div>

<div class="tp">
  <button class="tbtn pb" id="play-btn"><svg id="play-ico" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>
  <button class="tbtn sb" onclick="stopSeq()"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg></button>
  <button class="lbtn on" id="loop-btn" onclick="toggleLoop()">⟳ Loop</button>
  <button class="lbtn"    id="shot-btn" onclick="toggleShot()">▶ One-shot</button>
  <div class="ts"></div>
  <span class="tl">BPM</span>
  <input class="ti" id="bpm-in" type="number" value="90" min="40" max="240">
  <div class="ts"></div>
  <span class="tl">Steps</span>
  <select class="tsl" id="step-sel" onchange="changeSteps()">
    <option value="16">16</option><option value="32" selected>32</option><option value="64">64</option>
  </select>
  <div class="bd" id="bdisp">—</div>
</div>

<div class="body">
  <div class="center">
    <div class="mode-bar">
      <button class="mbtn on" id="mb-play" onclick="setMode('play',this)">▶ Play Mode</button>
      <button class="mbtn"    id="mb-seq"  onclick="setMode('seq',this)">⊞ Sequencer</button>
    </div>
    <div class="guitar-wrap" id="guitar-wrap">
      <canvas id="guitar-canvas"></canvas>
      <canvas id="hit-canvas" class="hit-canvas"></canvas>
      <div id="interact-layer" class="interact-layer"></div>
      <!-- Sequencer overlay -->
      <div class="seq-overlay" id="seq-overlay">
        <div class="seq-close"><button onclick="setMode('play',document.getElementById('mb-play'))">✕ Close</button></div>
        <div class="seq-scroll">
          <div class="seq-grid" id="seq-grid"></div>
          <div class="vel-row" id="vel-row"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="fx">
    <div class="fbox">
      <div class="fhd">Vibrato</div>
      <div class="frow"><div class="ftop"><span class="fn">Depth</span><span class="fv" id="fv-vd">30%</span></div><input class="fsl" type="range" id="fs-vd" min="0" max="100" value="30"></div>
      <div class="frow"><div class="ftop"><span class="fn">Rate</span><span class="fv" id="fv-vr">5.0Hz</span></div><input class="fsl" type="range" id="fs-vr" min="5" max="80" value="50"></div>
    </div>
    <div class="fbox">
      <div class="fhd">Pitch / Glide</div>
      <div class="pitch-big" id="pitch-big">+0.0</div>
      <div class="frow"><div class="ftop"><span class="fn">Bend</span><span class="fv" id="fv-pb">+0.0st</span></div><input class="fsl" type="range" id="fs-pb" min="-120" max="120" value="0"></div>
      <div class="frow"><div class="ftop"><span class="fn">Glide</span><span class="fv" id="fv-gl">80ms</span></div><input class="fsl" type="range" id="fs-gl" min="10" max="500" value="80"></div>
    </div>
    <div class="fbox" style="flex:1">
      <div class="fhd">Tone / FX</div>
      <div class="frow"><div class="ftop"><span class="fn">Tone</span><span class="fv" id="fv-tn">70%</span></div><input class="fsl" type="range" id="fs-tn" min="0" max="100" value="70"></div>
      <div class="frow"><div class="ftop"><span class="fn">Reverb</span><span class="fv" id="fv-rv">25%</span></div><input class="fsl" type="range" id="fs-rv" min="0" max="100" value="25"></div>
      <div class="frow"><div class="ftop"><span class="fn">Output</span><span class="fv" id="fv-out">0dB</span></div><input class="fsl" type="range" id="fs-out" min="-24" max="6" value="0"></div>
      <div class="fhd" style="margin-top:2px">Level</div>
      <div class="vu-b"><div class="vu-f" id="vu-fill"></div></div>
      <button class="clr" onclick="clearAll()">✕ Clear Seq</button>
    </div>
  </div>
</div>
</div>

<script>
// ════════════════════════════════════════════════
// TUNINGS
// ════════════════════════════════════════════════
const TUNINGS={
  lap6:{label:'E · B · G · D · A · E',strings:[
    {name:'1',note:'E5',freq:659.25,thick:1.2,col:'#e8dfa8'},
    {name:'2',note:'B4',freq:493.88,thick:1.6,col:'#d8cf98'},
    {name:'3',note:'G4',freq:392.00,thick:2.1,col:'#c8bf88'},
    {name:'4',note:'D4',freq:293.66,thick:2.7,col:'#b8af78'},
    {name:'5',note:'A3',freq:220.00,thick:3.4,col:'#a89f68'},
    {name:'6',note:'E3',freq:164.81,thick:4.2,col:'#988f58'},
  ]},
  e9:{label:'F#·D#·G#·E·B·G#·E·D·B·F#',strings:[
    {name:'1', note:'F#5',freq:739.99,thick:1.0,col:'#f0e8b0'},
    {name:'2', note:'D#5',freq:622.25,thick:1.3,col:'#e4dca4'},
    {name:'3', note:'G#4',freq:415.30,thick:1.6,col:'#d8d098'},
    {name:'4', note:'E4', freq:329.63,thick:2.0,col:'#ccc48c'},
    {name:'5', note:'B3', freq:246.94,thick:2.4,col:'#c0b880'},
    {name:'6', note:'G#3',freq:207.65,thick:2.8,col:'#b4ac74'},
    {name:'7', note:'E3', freq:164.81,thick:3.2,col:'#a8a068'},
    {name:'8', note:'D3', freq:146.83,thick:3.6,col:'#9c9460'},
    {name:'9', note:'B2', freq:123.47,thick:4.0,col:'#908858'},
    {name:'10',note:'F#2',freq:92.50, thick:4.8,col:'#847c50'},
  ]}
};

let tuning='lap6', numSteps=32, mode='play';
let loopOn=true, oneShot=false, playing=false;
let currentStep=-1, stepTimer=null;
let ctx_a=null, reverbConv=null, reverbGain=null, dryGain=null;
let vibratoPhase=0, pitchCurrent=0;
let selectedString=0;
let slidePct=0.35; // steel bar horizontal position
let slideDragging=false, slideStartX=0, slideStartPct=0;
let seqDragging=false, seqDragVal=false, velDragging=false;
let durDragging=false, durSi=-1, durT=-1, durStartX=0, durStartDur=1;

const FX={vd:.30,vr:5.0,pb:0.0,gl:80,tn:.70,rv:.25,out:0.0};
const notesData={};

function initNotes(t){
  if(!notesData[t]) notesData[t]={};
  TUNINGS[t].strings.forEach((_,si)=>{
    if(!notesData[t][si]) notesData[t][si]={};
    for(let i=0;i<numSteps;i++) if(!notesData[t][si][i]) notesData[t][si][i]={on:false,vel:100,dur:1};
  });
}
function N(){return notesData[tuning];}

// ════════════════════════════════════════════════
// CANVAS GUITAR RENDERING
// ════════════════════════════════════════════════
const gc=document.getElementById('guitar-canvas');
const gc2=document.getElementById('hit-canvas');
let gctx=null, hctx=null;
let stringYs=[], slideX=0, bodyRect={x:0,y:0,w:0,h:0};
let hitParticles=[];

function resizeCanvases(){
  const wrap=document.getElementById('guitar-wrap');
  const W=wrap.clientWidth, H=wrap.clientHeight;
  gc.width=W; gc.height=H;
  gc2.width=W; gc2.height=H;
  if(!gctx){gctx=gc.getContext('2d');hctx=gc2.getContext('2d');}
  drawGuitar();
}

function drawGuitar(){
  const W=gc.width, H=gc.height;
  gctx.clearRect(0,0,W,H);
  const strs=TUNINGS[tuning].strings;

  // ── Body shape (rounded rect) ──
  const bx=0,by=0,bw=W,bh=H;
  bodyRect={x:bx,y:by,w:bw,h:bh};
  roundRect(gctx,bx,by,bw,bh,12);
  gctx.save(); gctx.clip();

  // Wood grain background
  drawWoodGrain(gctx,W,H);

  // Binding strips top/bottom
  gctx.fillStyle='#c8a030';
  gctx.fillRect(0,0,W,5);
  gctx.fillRect(0,H-5,W,5);
  // Binding shimmer
  const bShim=gctx.createLinearGradient(0,0,W,0);
  bShim.addColorStop(0,'rgba(255,220,80,.0)');
  bShim.addColorStop(.5,'rgba(255,220,80,.5)');
  bShim.addColorStop(1,'rgba(255,220,80,.0)');
  gctx.fillStyle=bShim;
  gctx.fillRect(0,0,W,5);
  gctx.fillRect(0,H-5,W,5);

  // Head area (left side panel)
  const headW=60;
  const headGrad=gctx.createLinearGradient(0,0,headW,0);
  headGrad.addColorStop(0,'rgba(10,6,2,.85)');
  headGrad.addColorStop(1,'rgba(10,6,2,0)');
  gctx.fillStyle=headGrad;
  gctx.fillRect(0,0,headW,H);

  // Bridge area (right side panel)
  const bridgeGrad=gctx.createLinearGradient(W-50,0,W,0);
  bridgeGrad.addColorStop(0,'rgba(10,6,2,0)');
  bridgeGrad.addColorStop(1,'rgba(10,6,2,.8)');
  gctx.fillStyle=bridgeGrad;
  gctx.fillRect(W-50,0,50,H);

  // Nut line
  gctx.strokeStyle='#d4b840';
  gctx.lineWidth=3;
  gctx.shadowColor='rgba(212,184,64,.5)';gctx.shadowBlur=4;
  gctx.beginPath(); gctx.moveTo(headW,5); gctx.lineTo(headW,H-5); gctx.stroke();
  gctx.shadowBlur=0;

  // Bridge line
  gctx.strokeStyle='#b09030';
  gctx.lineWidth=4;
  gctx.beginPath(); gctx.moveTo(W-30,8); gctx.lineTo(W-30,H-8); gctx.stroke();

  // Fret lines
  const fretPcts=[.083,.161,.235,.305,.370,.431,.488,.541,.591,.639,.683,.724];
  const fretDots=[2,4,6,8,11];
  const strStart=headW, strEnd=W-30, strLen=strEnd-strStart;

  gctx.strokeStyle='rgba(160,140,80,.3)';
  gctx.lineWidth=1;
  fretPcts.forEach(p=>{
    const fx=strStart+p*strLen;
    gctx.beginPath(); gctx.moveTo(fx,8); gctx.lineTo(fx,H-8); gctx.stroke();
  });

  // Fret position dots
  fretDots.forEach(i=>{
    if(i<fretPcts.length){
      const fx=strStart+fretPcts[i]*strLen;
      gctx.beginPath();
      gctx.arc(fx,H/2,5,0,Math.PI*2);
      gctx.fillStyle='rgba(200,160,60,.35)';
      gctx.fill();
    }
  });

  // Pickup (dark rect)
  const puW=strLen*.08, puH=H*.55;
  const puX=strStart+strLen*.45-puW/2, puY=(H-puH)/2;
  gctx.save();
  gctx.fillStyle='#0a0806';
  roundRect(gctx,puX,puY,puW,puH,4); gctx.fill();
  // Pole pieces
  const nStrs=strs.length;
  const poleH=puH/(nStrs+1);
  for(let i=0;i<nStrs;i++){
    const py=puY+(i+1)*poleH;
    const pg=gctx.createRadialGradient(puX+puW/2,py,1,puX+puW/2,py,4);
    pg.addColorStop(0,'#6a6050'); pg.addColorStop(1,'#2a2018');
    gctx.beginPath(); gctx.arc(puX+puW/2,py,4,0,Math.PI*2);
    gctx.fillStyle=pg; gctx.fill();
  }
  gctx.restore();

  // Tuning pegs (left)
  const pegHalf=Math.ceil(strs.length/2);
  const pegPad=H/(pegHalf+1);
  for(let i=0;i<pegHalf;i++){
    drawPeg(gctx,18,(i+1)*pegPad);
  }
  for(let i=0;i<strs.length-pegHalf;i++){
    drawPeg(gctx,38,(i+1)*(H/(strs.length-pegHalf+1)));
  }

  // Strings + Y positions
  stringYs=[];
  const topPad=24, botPad=24;
  strs.forEach((str,si)=>{
    const y=topPad+(H-topPad-botPad)*si/(Math.max(strs.length-1,1));
    stringYs.push(y);
    drawString(gctx,headW,y,W-30,y,str,si);
  });

  // String labels (left of nut)
  strs.forEach((str,si)=>{
    gctx.font='bold 9px IBM Plex Mono,monospace';
    gctx.fillStyle='rgba(200,180,100,.7)';
    gctx.textAlign='right';
    gctx.fillText(`#${str.name} ${str.note}`,headW-6,stringYs[si]+3);
  });

  // Slide bar (steel)
  drawSlideBar(gctx,W,H);

  // Playhead marker
  if(playing && currentStep>=0){
    const px=strStart+(currentStep+.5)/numSteps*strLen;
    gctx.strokeStyle='rgba(232,196,90,.55)';
    gctx.lineWidth=1.5;
    gctx.setLineDash([3,3]);
    gctx.beginPath(); gctx.moveTo(px,8); gctx.lineTo(px,H-8); gctx.stroke();
    gctx.setLineDash([]);
  }

  // Seq note dots on strings
  if(mode==='play'){
    TUNINGS[tuning].strings.forEach((_,si)=>{
      for(let t=0;t<numSteps;t++){
        const nn=N()[si][t];
        if(nn&&nn.on){
          const dur=Math.max(1,nn.dur||1);
          const dx=strStart+(t+.5)/numSteps*strLen;
          const dy=stringYs[si];
          const isPlaying=(playing&&t===currentStep);
          // Duration bar
          if(dur>1){
            const barEnd=strStart+(t+dur)/numSteps*strLen;
            gctx.beginPath();
            gctx.moveTo(dx,dy);
            gctx.lineTo(barEnd,dy);
            gctx.strokeStyle=isPlaying?'rgba(255,220,80,.8)':'rgba(200,140,20,.4)';
            gctx.lineWidth=isPlaying?5:3;
            gctx.stroke();
          }
          // Note dot
          gctx.beginPath();
          gctx.arc(dx,dy,isPlaying?7:5,0,Math.PI*2);
          const dg=gctx.createRadialGradient(dx-1,dy-1,1,dx,dy,isPlaying?7:5);
          dg.addColorStop(0,isPlaying?'#fff':'#ffe080');
          dg.addColorStop(1,isPlaying?'#e8c040':'#c07010');
          gctx.fillStyle=dg;
          gctx.shadowColor=isPlaying?'rgba(255,220,60,.9)':'rgba(200,140,20,.5)';
          gctx.shadowBlur=isPlaying?14:6;
          gctx.fill(); gctx.shadowBlur=0;
        }
      }
    });
  }

  gctx.restore();
}

function drawWoodGrain(ctx,W,H){
  // Base warm walnut
  const baseGrad=ctx.createLinearGradient(0,0,W,H);
  baseGrad.addColorStop(0,'#4a2c0e');
  baseGrad.addColorStop(.15,'#3a2008');
  baseGrad.addColorStop(.35,'#5a3410');
  baseGrad.addColorStop(.5,'#2e1806');
  baseGrad.addColorStop(.65,'#4e2c0e');
  baseGrad.addColorStop(.8,'#3a2008');
  baseGrad.addColorStop(1,'#2a1606');
  ctx.fillStyle=baseGrad;
  ctx.fillRect(0,0,W,H);

  // Horizontal wood grain lines
  ctx.save();
  for(let i=0;i<80;i++){
    const y=Math.random()*H;
    const thickness=Math.random()*1.5+.3;
    const alpha=Math.random()*.07+.01;
    const darker=Math.random()>.5;
    ctx.strokeStyle=darker?`rgba(15,8,2,${alpha})`:`rgba(100,60,20,${alpha})`;
    ctx.lineWidth=thickness;
    // Wavy grain
    ctx.beginPath();
    ctx.moveTo(0,y);
    for(let x=0;x<W;x+=40){
      const wy=y+Math.sin(x*.015+i*.3)*6*(Math.random()*.5+.75);
      ctx.lineTo(x,wy);
    }
    ctx.stroke();
  }
  ctx.restore();

  // Light reflection (gloss)
  const gloss=ctx.createLinearGradient(0,0,0,H*.4);
  gloss.addColorStop(0,'rgba(255,200,100,.06)');
  gloss.addColorStop(.5,'rgba(255,200,100,.02)');
  gloss.addColorStop(1,'rgba(255,200,100,0)');
  ctx.fillStyle=gloss;
  ctx.fillRect(0,0,W,H*.4);

  // Vignette edges
  const vig=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);
}

function drawString(ctx,x1,y,x2,_y2,str,si){
  const thick=str.thick;
  // Shadow
  ctx.strokeStyle='rgba(0,0,0,.5)';
  ctx.lineWidth=thick+1.5;
  ctx.beginPath(); ctx.moveTo(x1,y+1); ctx.lineTo(x2,y+1); ctx.stroke();
  // Core string
  const sg=ctx.createLinearGradient(0,y-thick,0,y+thick);
  sg.addColorStop(0,'rgba(255,255,240,.6)');
  sg.addColorStop(.3,str.col);
  sg.addColorStop(.7,str.col);
  sg.addColorStop(1,'rgba(30,20,5,.7)');
  ctx.strokeStyle=sg;
  ctx.lineWidth=thick;
  ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke();
  // Highlight
  ctx.strokeStyle='rgba(255,250,230,.25)';
  ctx.lineWidth=thick*.3;
  ctx.beginPath(); ctx.moveTo(x1,y-thick*.2); ctx.lineTo(x2,y-thick*.2); ctx.stroke();
}

function drawPeg(ctx,x,y){
  const g=ctx.createRadialGradient(x-2,y-2,1,x,y,7);
  g.addColorStop(0,'#d0c060'); g.addColorStop(.6,'#887020'); g.addColorStop(1,'#3a2c08');
  ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(200,160,40,.4)'; ctx.lineWidth=1; ctx.stroke();
  // Center dot
  ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2);
  ctx.fillStyle='#c8a830'; ctx.fill();
}

function drawSlideBar(ctx,W,H){
  const strs=TUNINGS[tuning].strings;
  const strStart=60, strEnd=W-30, strLen=strEnd-strStart;
  slideX=strStart+slidePct*strLen;
  const barH=H-20;
  const bx=slideX-8, by=10;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.4)';
  roundRect(ctx,bx+3,by+3,16,barH,7); ctx.fill();

  // Chrome body
  const cg=ctx.createLinearGradient(bx,0,bx+16,0);
  cg.addColorStop(0,'#888070');
  cg.addColorStop(.2,'#d8d0b8');
  cg.addColorStop(.35,'#f0ece0');
  cg.addColorStop(.5,'#ffffff');
  cg.addColorStop(.65,'#f0ece0');
  cg.addColorStop(.8,'#c8c0a8');
  cg.addColorStop(1,'#706860');
  ctx.fillStyle=cg;
  roundRect(ctx,bx,by,16,barH,7); ctx.fill();

  // Knurling lines
  ctx.strokeStyle='rgba(100,90,70,.3)'; ctx.lineWidth=1;
  for(let i=0;i<barH-16;i+=8){
    ctx.beginPath();
    ctx.moveTo(bx+3,by+8+i);
    ctx.lineTo(bx+13,by+8+i);
    ctx.stroke();
  }

  // Gloss highlight
  const hg=ctx.createLinearGradient(bx,0,bx+16,0);
  hg.addColorStop(0,'rgba(255,255,255,0)');
  hg.addColorStop(.3,'rgba(255,255,255,.5)');
  hg.addColorStop(.5,'rgba(255,255,255,.1)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;
  roundRect(ctx,bx,by,16,barH,7); ctx.fill();

  // Pitch label above bar
  const semitones=(slidePct-.35)*28;
  ctx.font='bold 10px IBM Plex Mono,monospace';
  ctx.fillStyle='rgba(232,196,90,.9)';
  ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
  ctx.fillText((semitones>=0?'+':'')+semitones.toFixed(1)+'st',slideX,by-4);
  ctx.shadowBlur=0;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Hit particle animation
function spawnHit(x,y,col){
  for(let i=0;i<14;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*3+1;
    hitParticles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,col});
  }
  if(!animRunning) animHits();
}
let animRunning=false;
function animHits(){
  animRunning=true;
  hctx.clearRect(0,0,gc2.width,gc2.height);
  hitParticles=hitParticles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.life-=.06;
    if(p.life<=0) return false;
    hctx.globalAlpha=p.life;
    hctx.beginPath(); hctx.arc(p.x,p.y,2,0,Math.PI*2);
    hctx.fillStyle=p.col; hctx.fill();
    return true;
  });
  hctx.globalAlpha=1;
  if(hitParticles.length>0) requestAnimationFrame(animHits);
  else animRunning=false;
}

// String vibration animation
let vibratingStrings={};
function animVibration(){
  if(Object.keys(vibratingStrings).length===0) return;
  drawGuitar();
  // Draw vibration waves over strings
  const strs=TUNINGS[tuning].strings;
  const W=gc.width, strStart=60, strEnd=W-30;
  gctx.save();
  roundRect(gctx,0,0,W,gc.height,12); gctx.clip();
  Object.entries(vibratingStrings).forEach(([si,info])=>{
    const y=stringYs[+si];
    const str=strs[+si];
    const amp=info.amp*(info.t/info.maxT);
    gctx.strokeStyle=str.col;
    gctx.lineWidth=str.thick*.7;
    gctx.globalAlpha=.6;
    gctx.beginPath();
    gctx.moveTo(strStart,y);
    for(let x=strStart;x<strEnd;x+=2){
      const wave=Math.sin((x-strStart)*.08+info.phase)*amp;
      gctx.lineTo(x,y+wave);
    }
    gctx.stroke();
    gctx.globalAlpha=1;
    info.t-=1; info.phase+=.18;
    if(info.t<=0) delete vibratingStrings[si];
  });
  gctx.restore();
  requestAnimationFrame(animVibration);
}

function getSlideX(){
  const strStart=60, strEnd=gc.width-30;
  return strStart+slidePct*(strEnd-strStart);
}

const il=document.getElementById('interact-layer');

il.addEventListener('mousedown',e=>{
  const r=il.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(gc.width/r.width);
  const my=(e.clientY-r.top)*(gc.height/r.height);
  // Check slide bar hit (wide hit area)
  if(Math.abs(mx-getSlideX())<20&&my>4&&my<gc.height-4){
    slideDragging=true; slideStartX=e.clientX; slideStartPct=slidePct;
    il.style.cursor='ew-resize';
    return;
  }
  // Check string hit (play mode)
  if(mode==='play'){
    const strs=TUNINGS[tuning].strings;
    for(let si=0;si<strs.length;si++){
      if(Math.abs(my-stringYs[si])<18){
        pluckString(si,mx);
        break;
      }
    }
  }
});

document.addEventListener('mousemove',e=>{
  if(durDragging){
    const dx=e.clientX-durStartX;
    const CELL_W=26;
    const newDur=Math.max(1,Math.min(numSteps-durT, durStartDur+Math.round(dx/(CELL_W+2))));
    if(newDur!==N()[durSi][durT].dur){
      N()[durSi][durT].dur=newDur;
      renderNoteBlock(durSi,durT);
      if(mode==='play') drawGuitar();

    return;
  }
  if(!slideDragging) return;
  const wrap=document.getElementById('guitar-wrap');
  const r=wrap.getBoundingClientRect();
  const strLen=gc.width-90;
  const dx=(e.clientX-slideStartX)*(gc.width/r.width);
  slidePct=Math.max(0,Math.min(1,slideStartPct+dx/strLen));
  updateSlideFX();
  drawGuitar();
});
document.addEventListener('mouseup',()=>{
  if(slideDragging){slideDragging=false;il.style.cursor='crosshair';}
  seqDragging=false; velDragging=false; durDragging=false;
});

// Touch support
il.addEventListener('touchstart',e=>{

  }

  slidePct=Math.max(0,Math.min(1,slideStartPct+dx/strLen));

},{passive:true});
document.addEventListener('touchend',()=>{slideDragging=false;});

function updateSlideFX(){
  const s=(slidePct-.35)*28;
  FX.pb=s;
  document.getElementById('pitch-big').textContent=(s>=0?'+':'')+s.toFixed(1);
  document.getElementById('fv-pb').textContent=(s>=0?'+':'')+s.toFixed(1)+'st';
}

function pluckString(si,hitX){
  if(!ctx_a){ctx_a=new (window.AudioContext||window.webkitAudioContext)();buildReverb();}
  const str=TUNINGS[tuning].strings[si];
  const semitones=(slidePct-.35)*28;
  playNote(str.freq,1.0,semitones*100,(FX.tn-.5)*18,1.4);
  // Particles
  const r=gc2.getBoundingClientRect();
  const sy=stringYs[si]*(r.height/gc2.height);
  const sx=(hitX||getSlideX())*(r.width/gc2.width);
  spawnHit(hitX||getSlideX(),stringYs[si],str.col);
  // Vibration
  const had=!!vibratingStrings[si];
  vibratingStrings[si]={amp:8-si*0.5,t:40,maxT:40,phase:0};
  if(!had) animVibration();
}

const CELL_W=26;

function buildSeqGrid(){
  initNotes(tuning);
  const g=document.getElementById('seq-grid'); g.innerHTML='';
  TUNINGS[tuning].strings.forEach((str,si)=>{
    const row=document.createElement('div'); row.className='srow';
    const lbl=document.createElement('div'); lbl.className='slbl';
    lbl.textContent=`#${str.name} ${str.note}`; row.appendChild(lbl);
    const cells=document.createElement('div');
    cells.style.cssText='position:relative;display:flex;gap:2px;';
    for(let t=0;t<numSteps;t++){
      const c=document.createElement('div');
      c.className='scell'+(t%4===0?' b4':'');
      c.dataset.si=si; c.dataset.t=t;
      c.addEventListener('mousedown',seqDown);
      c.addEventListener('mouseenter',seqEnter);
      cells.appendChild(c);
    }
    row.appendChild(cells);
    g.appendChild(row);
  });
  renderAllNoteBlocks();
  buildVelRow();
}

function renderAllNoteBlocks(){
  TUNINGS[tuning].strings.forEach((_,si)=>{
    for(let t=0;t<numSteps;t++) renderNoteBlock(si,t);
  });
}

function renderNoteBlock(si,t){
  const n=N()[si][t];
  const cellEl=document.querySelector(`.scell[data-si="${si}"][data-t="${t}"]`);
  if(!cellEl) return;
  cellEl.classList.remove('on');
  const old=cellEl.querySelector('.note-block');
  if(old) old.remove();
  if(!n.on) return;
  const dur=Math.max(1,n.dur||1);
  const blockW=dur*CELL_W+(dur-1)*2;
  const block=document.createElement('div');
  block.className='note-block';
  block.style.cssText=`position:absolute;left:0;top:1px;height:calc(100% - 2px);width:${blockW}px;
    background:linear-gradient(to right,#e8922a,#c87010);
    border-radius:3px;border:1px solid #f8b840;
    box-shadow:0 0 6px rgba(232,146,42,.5);pointer-events:none;z-index:2;overflow:hidden;`;
  const handle=document.createElement('div');
  handle.className='dur-handle';
  handle.style.cssText=`position:absolute;right:0;top:0;bottom:0;width:8px;cursor:ew-resize;
    background:rgba(255,220,80,.4);border-left:1px solid rgba(255,220,80,.6);
    pointer-events:all;border-radius:0 2px 2px 0;`;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault(); e.stopPropagation();
    durDragging=true; durSi=si; durT=t;
    durStartX=e.clientX; durStartDur=n.dur||1;
  });
  block.appendChild(handle);
  cellEl.style.position='relative';
  cellEl.appendChild(block);
}

function seqDown(e){
  if(e.target.classList.contains('dur-handle')) return;
  e.preventDefault(); seqDragging=true;
  const si=+this.dataset.si, t=+this.dataset.t;
  seqDragVal=!N()[si][t].on;
  toggleNote(si,t,seqDragVal);
  selectedString=si; buildVelRow();
}
function seqEnter(){
  if(!seqDragging||durDragging) return;
  toggleNote(+this.dataset.si,+this.dataset.t,seqDragVal);
}
function toggleNote(si,t,val){
  N()[si][t].on=val;
  if(!val) N()[si][t].dur=1;
  renderNoteBlock(si,t);
  updateVB(si,t);
  if(mode==='play') drawGuitar();
}
function buildVelRow(){
  const vr=document.getElementById('vel-row'); vr.innerHTML='';
  for(let t=0;t<numSteps;t++){
    const w=document.createElement('div'); w.className='vbw'; w.dataset.t=t;
    const b=document.createElement('div');
    b.className='vbi'+(N()[selectedString][t].on?' lit':'');
    b.id=`vb-${t}`; b.style.height=(N()[selectedString][t].vel/127*100)+'%';
    w.appendChild(b);
    w.addEventListener('mousedown',vDown); w.addEventListener('mousemove',vMove);
    vr.appendChild(w);
  }
}
function vDown(e){velDragging=true;setV(e,this);}
function vMove(e){if(!velDragging)return;setV(e,this);}
function setV(e,w){
  const t=+w.dataset.t,r=w.getBoundingClientRect();
  const p=1-Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
  N()[selectedString][t].vel=Math.round(p*127);
  if(p>.02){N()[selectedString][t].on=true;toggleNote(selectedString,t,true);}
  updateVB(selectedString,t);
}
function updateVB(si,t){
  if(si!==selectedString)return;
  const b=document.getElementById(`vb-${t}`); if(!b)return;
  b.style.height=(N()[si][t].vel/127*100)+'%';
  b.className='vbi'+(N()[si][t].on?' lit':'');
}

// AUDIO
// ════════════════════════════════════════════════
async function buildReverb(){
  const sr=ctx_a.sampleRate,len=sr*2.8;
  const buf=ctx_a.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){const ch=buf.getChannelData(c);for(let i=0;i<len;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
  reverbConv=ctx_a.createConvolver(); reverbConv.buffer=buf;
  reverbGain=ctx_a.createGain(); reverbGain.gain.value=FX.rv;
  dryGain=ctx_a.createGain(); dryGain.gain.value=1-FX.rv*.5;
  reverbConv.connect(reverbGain); reverbGain.connect(ctx_a.destination);
  dryGain.connect(ctx_a.destination);
}
function playNote(freq,velN,centsOff,fgain,dur){
  if(!ctx_a)return;
  const vol=Math.pow(10,FX.out/20)*.16*velN,now=ctx_a.currentTime;
  const ratio=Math.pow(2,centsOff/1200);
  const o1=ctx_a.createOscillator(); o1.type='sawtooth'; o1.frequency.value=freq*ratio;
  const o2=ctx_a.createOscillator(); o2.type='triangle'; o2.frequency.value=freq*ratio*1.003;
  const flt=ctx_a.createBiquadFilter(); flt.type='lowshelf'; flt.frequency.value=2800; flt.gain.value=fgain;
  const env=ctx_a.createGain();
  env.gain.setValueAtTime(0,now);
  env.gain.linearRampToValueAtTime(vol,now+.012);
  env.gain.setTargetAtTime(vol*.55,now+.015,.1);
  env.gain.setTargetAtTime(0,now+dur*.45,dur*.28);
  o1.connect(flt);o2.connect(flt);flt.connect(env);
  env.connect(dryGain||ctx_a.destination);
  if(reverbConv) env.connect(reverbConv);
  o1.start(now);o2.start(now);o1.stop(now+dur+.4);o2.stop(now+dur+.4);
}

// ════════════════════════════════════════════════
// SEQUENCER PLAYBACK
// ════════════════════════════════════════════════
function getBPM(){return Math.max(40,Math.min(240,parseFloat(document.getElementById('bpm-in').value)||90));}

function startSeq(){
  if(!ctx_a){ctx_a=new (window.AudioContext||window.webkitAudioContext)();buildReverb();}
  playing=true;currentStep=0;vibratoPhase=0;pitchCurrent=0;
  scheduleStep();animVU();
  document.getElementById('play-ico').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}
function stopSeq(){
  playing=false;currentStep=-1;
  if(stepTimer)clearTimeout(stepTimer);
  clearPH();
  document.getElementById('bdisp').textContent='—';
  document.getElementById('vu-fill').style.width='0%';
  document.getElementById('play-ico').innerHTML='<polygon points="5,3 19,12 5,21"/>';
  drawGuitar();
}
function scheduleStep(){
  if(!playing)return;
  const bpm=getBPM(),ss=60/bpm/4;
  const strs=TUNINGS[tuning].strings;
  clearPH();
  document.querySelectorAll(`.scell[data-t="${currentStep}"]`).forEach(el=>el.classList.add('ph'));
  document.getElementById('bdisp').textContent=`${Math.floor(currentStep/4)+1}.${(currentStep%4)+1}`;

  vibratoPhase+=FX.vr*ss;
  const vib=FX.vd*60*Math.sin(vibratoPhase*2*Math.PI);
  pitchCurrent+=(FX.pb-pitchCurrent)*(1-Math.exp(-ss/(FX.gl*.001+.001)));
  const tc=pitchCurrent*100+vib;
  document.getElementById('pitch-big').textContent=(pitchCurrent>=0?'+':'')+pitchCurrent.toFixed(1);

  const fg=(FX.tn-.5)*18;
  strs.forEach((str,si)=>{
    const nn=N()[si][currentStep];
    if(nn&&nn.on){
      const dur=Math.max(1,nn.dur||1);
      playNote(str.freq,nn.vel/127,tc,fg,ss*dur*1.8);
      const had=!!vibratingStrings[si];
      vibratingStrings[si]={amp:7-si*.3,t:30,maxT:30,phase:0};
      if(!had) animVibration();
      spawnHit(getSlideX(),stringYs[si]||0,str.col);
    }
  });
  drawGuitar();

  currentStep=(currentStep+1)%numSteps;
  if(currentStep===0&&oneShot&&!loopOn){stopSeq();return;}
  stepTimer=setTimeout(scheduleStep,ss*1000-4);
}
function clearPH(){document.querySelectorAll('.scell.ph').forEach(el=>el.classList.remove('ph'));}

function animVU(){
  if(!playing)return;
  const t=performance.now()*.001;
  const s=.5+Math.sin(t*2.1)*.22+Math.sin(t*5.3)*.1;
  document.getElementById('vu-fill').style.width=Math.min(100,s*Math.pow(10,FX.out/20)*72)+'%';
  requestAnimationFrame(animVU);
}

// ════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════
document.getElementById('play-btn').addEventListener('click',()=>{if(playing)stopSeq();else startSeq();});
function toggleLoop(){loopOn=!loopOn;document.getElementById('loop-btn').classList.toggle('on',loopOn);}
function toggleShot(){oneShot=!oneShot;document.getElementById('shot-btn').classList.toggle('on',oneShot);}
function changeSteps(){
  const p=numSteps; numSteps=+document.getElementById('step-sel').value;
  TUNINGS[tuning].strings.forEach((_,si)=>{for(let t=p;t<numSteps;t++)if(!notesData[tuning][si][t])notesData[tuning][si][t]={on:false,vel:100,dur:1};});
  buildSeqGrid(); drawGuitar();
}
function setTuning(t,btn){
  tuning=t; initNotes(t);
  document.querySelectorAll('.hbtn[id^="t-"]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildSeqGrid(); drawGuitar();
}
function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('seq-overlay').classList.toggle('open',m==='seq');
  if(m==='play') drawGuitar();
}
function clearAll(){
  TUNINGS[tuning].strings.forEach((_,si)=>{for(let t=0;t<numSteps;t++)notesData[tuning][si][t]={on:false,vel:100,dur:1};});
  buildSeqGrid(); drawGuitar();
}

// FX sliders
function bindFX(id,key,toV,toD,cb){
  document.getElementById('fs-'+id).addEventListener('input',function(){
    FX[key]=toV(+this.value);
    document.getElementById('fv-'+id).textContent=toD(FX[key]);
    if(cb)cb(FX[key]);
  });
}
bindFX('vd','vd',v=>v/100,v=>Math.round(v*100)+'%');
bindFX('vr','vr',v=>v/10,v=>v.toFixed(1)+'Hz');
bindFX('pb','pb',v=>v/10,v=>(v>=0?'+':'')+v.toFixed(1)+'st');
bindFX('gl','gl',v=>v,v=>Math.round(v)+'ms');
bindFX('tn','tn',v=>v/100,v=>Math.round(v*100)+'%');
bindFX('rv','rv',v=>v/100,v=>Math.round(v*100)+'%',v=>{if(reverbGain){reverbGain.gain.value=v;dryGain.gain.value=1-v*.5;}});
bindFX('out','out',v=>v,v=>(v>=0?'+':'')+parseFloat(v).toFixed(1)+'dB');

// ════════════════════════════════════════════════
// PWA — Service Worker & Install
// ════════════════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js')
      .then(r=>console.log('SW registered:', r.scope))
      .catch(e=>console.log('SW error:', e));
  });
}

// Install prompt (Android Chrome)
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  // Show subtle install hint in status
  const hint=document.createElement('button');
  hint.textContent='⬇ ホーム画面に追加';
  hint.style.cssText=`position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
    background:var(--amber);color:#000;border:none;border-radius:20px;
    padding:8px 18px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    letter-spacing:.1em;cursor:pointer;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.5);`;
  hint.onclick=()=>{
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;hint.remove();});
  };
  document.body.appendChild(hint);
  setTimeout(()=>hint.remove(), 8000);
});

// Prevent default scroll/zoom on iOS
document.addEventListener('gesturestart', e=>e.preventDefault(), {passive:false});
document.addEventListener('gesturechange', e=>e.preventDefault(), {passive:false});

// ════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════
initNotes('lap6'); initNotes('e9');
const defPat=[[0,8,16,24],[4,12,20,28],[2,10,18,26],[6,14,22,30],[1,9,17,25],[5,13,21,29]];
const defDur=[[2,1,2,1],[1,2,1,2],[2,1,2,1],[1,1,2,1],[2,2,1,1],[1,1,1,2]];
defPat.forEach((steps,si)=>{
  steps.forEach((t,idx)=>{
    if(t<numSteps&&si<6) notesData['lap6'][si][t]={on:true,vel:[100,88,95,82,92,86][si],dur:defDur[si][idx]||1};
  });
});
buildSeqGrid();
resizeCanvases();
window.addEventListener('resize', resizeCanvases);
</script>
